const firestoreStore = (() => {
  try {
    const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(app);
    const stateRef = db.collection("knowledgeOS").doc("state");
    const withTimeout = (promise, ms = 6000) => Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error("Firestore request timed out")), ms))
    ]);
    return {
      async load() {
        const snap = await withTimeout(stateRef.get());
        const data = snap.exists ? snap.data() : null;
        return data?.tree && data?.notes ? { tree: data.tree, notes: data.notes } : null;
      },
      async save(data) {
        await stateRef.set({
          tree: data.tree,
          notes: data.notes,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        return true;
      }
    };
  } catch (e) {
    console.warn("Firestore init failed:", e);
    return {
      async load() { return null; },
      async save() { return false; }
    };
  }
})();

  async set(key, val) {
    try { await window.storage.set(key, JSON.stringify(val)); } catch {}
  }
};

  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
};

// ── Tree utilities ────────────────────────────────────────────────────────────
const flattenTree = (nodes, path = []) => {
  const r = [];
  for (const n of nodes) {
    r.push({ ...n, path });
    if (n.children) r.push(...flattenTree(n.children, [...path, n.label]));
  }
  return r;
};
const findNode = (nodes, id) => { for (const n of nodes) { if (n.id === id) return n; if (n.children) { const f = findNode(n.children, id); if (f) return f; } } return null; };
const toggleExpand = (nodes, id) => nodes.map(n => { if (n.id === id) return { ...n, expanded: !n.expanded }; if (n.children) return { ...n, children: toggleExpand(n.children, id) }; return n; });
const addToFolder = (nodes, fid, item) => nodes.map(n => { if (n.id === fid) return { ...n, expanded: true, children: [...(n.children || []), item] }; if (n.children) return { ...n, children: addToFolder(n.children, fid, item) }; return n; });
const removeFromTree = (nodes, id) => nodes.map(n => ({ ...n, children: n.children ? removeFromTree(n.children.filter(c => c.id !== id), id) : undefined })).filter(n => n.id !== id);
const updateTreeLabel = (nodes, id, label) => nodes.map(n => { if (n.id === id) return { ...n, label }; if (n.children) return { ...n, children: updateTreeLabel(n.children, id, label) }; return n; });

// Extract a node and return [extracted node, remaining tree]
// Remove a node by id from anywhere in the tree, return [extracted, newTree]
const extractNode = (nodes, id) => {
  let extracted = null;
  const remaining = nodes.reduce((acc, n) => {
    if (n.id === id) { extracted = n; return acc; } // skip = extract
    if (n.children) {
      const [ex, kids] = extractNode(n.children, id);
      if (ex) extracted = ex;
      acc.push({ ...n, children: kids });
    } else {
      acc.push(n);
    }
    return acc;
  }, []);
  return [extracted, remaining];
};

// Move dragId node into targetFolderId folder
const moveNode = (nodes, dragId, targetFolderId) => {
  const [node, trimmed] = extractNode(nodes, dragId);
  if (!node) return nodes;
  if (!targetFolderId) return [...trimmed, node];
  // Insert into target folder
  const insertInto = (ns) => ns.map(n => {
    if (n.id === targetFolderId) {
      return { ...n, expanded: true, children: [...(n.children || []), node] };
    }
    if (n.children) return { ...n, children: insertInto(n.children) };
    return n;
  });
  return insertInto(trimmed);
};

// ── Smart KOS Key generator ──────────────────────────────────────────────────
const generateKosKey = (title, tree, folderId) => {
  // Get folder abbreviation from path
  const flat = flattenTree(tree);
  const folder = flat.find(n => n.id === folderId);
  const path = folder ? [...(folder.path || []), folder.label] : [];
  
  // Build prefix from folder path (take first letters)
  const prefixParts = path.map(p => {
    const words = p.replace(/[^a-zA-Z0-9 ]/g, "").trim().split(/\s+/);
    return words.map(w => w[0]?.toUpperCase() || "").join("").slice(0, 3);
  });
  const prefix = prefixParts.slice(-2).join("-") || "KOS"; // last 2 folders
  
  // Build suffix from note title (first letters of words, max 3 chars)
  const titleWords = title.replace(/[^a-zA-Z0-9 ]/g, "").trim().split(/\s+/);
  const titleCode = titleWords.map(w => w[0]?.toUpperCase() || "").join("").slice(0, 4);
  
  // Add 3-digit counter based on timestamp
  const counter = String(Date.now() % 1000).padStart(3, "0");
  
  return "#" + prefix + "-" + titleCode + counter;
};

// ── Markdown renderer ─────────────────────────────────────────────────────────
function renderMD(md) {
  if (!md) return "";
  let h = md
    .replace(/```(\w*)\n([\s\S]*?)```/gm, (_, lang, code) => `<pre><code class="lang-${lang}">${code.trim().replace(/</g,'&lt;')}</code></pre>`)
    .replace(/^### (.+)$/gm, "<h3>$1</h3>")
    .replace(/^## (.+)$/gm, "<h2>$1</h2>")
    .replace(/^# (.+)$/gm, "<h1>$1</h1>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/^\> (.+)$/gm, "<blockquote>$1</blockquote>")
    .replace(/^\- (.+)$/gm, "<li>$1</li>")
    .replace(/^(\d+)\. (.+)$/gm, "<li>$2</li>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  h = h.replace(/(\|.+\|\n)+/g, table => {
    const rows = table.trim().split("\n").filter(r => !r.match(/^\|[-|: ]+\|$/));
    const pr = (row, tag) => "<tr>" + row.split("|").filter((_, i, a) => i > 0 && i < a.length - 1).map(c => `<${tag}>${c.trim()}</${tag}>`).join("") + "</tr>";
    return `<table>${pr(rows[0], "th")}${rows.slice(1).map(r => pr(r, "td")).join("")}</table>`;
  });
  h = h.split("\n\n").map(p => {
    if (p.match(/^<(h[123]|pre|table|blockquote|ul|ol|li)/) || !p.trim()) return p;
    return `<p>${p.trim()}</p>`;
  }).join("\n");
  h = h.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  return h;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }
@keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity:1; } }
`;

// ── Context Menu ──────────────────────────────────────────────────────────────
// ── ConfirmModal (replaces confirm() — blocked in iframes) ────────────────────
function ConfirmModal({ title, message, confirmLabel = "Delete", danger = true, onConfirm, onCancel }) {
  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal" style={{ width: 360 }}>
        <div className="modal-title">{title}</div>
        <div style={{ fontSize: 14, color: "var(--t1)", marginBottom: 22, lineHeight: 1.6 }}>{message}</div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className={`btn ${danger ? "btn-danger" : "btn-primary"}`} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

// ── RenameModal (replaces prompt() — blocked in iframes) ──────────────────────
function RenameModal({ current, type, onConfirm, onCancel }) {
  const [val, setVal] = useState(current);
  const submit = () => { if (val.trim() && val.trim() !== current) onConfirm(val.trim()); else onCancel(); };
  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal" style={{ width: 360 }}>
        <div className="modal-title">Rename {type}</div>
        <div className="modal-label">New name</div>
        <input className="modal-input" autoFocus value={val} onChange={e => setVal(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") submit(); if (e.key === "Escape") onCancel(); }} />
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={submit} disabled={!val.trim() || val.trim() === current}>Rename</button>
        </div>
      </div>
    </div>
  );
}

function ContextMenu({ x, y, items, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    setTimeout(() => document.addEventListener("mousedown", h), 0);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  // Keep menu inside viewport
  const left = Math.min(x, window.innerWidth - 180);
  const top = Math.min(y, window.innerHeight - items.length * 36 - 20);
  return (
    <div ref={ref} className="ctx-menu" style={{ left, top }}>
      {items.map((item, i) =>
        item === "sep" ? <div key={i} className="ctx-sep" /> :
        <div key={i} className={`ctx-item${item.danger ? " danger" : ""}`} onClick={() => { item.action(); onClose(); }}>
          <Icon d={item.icon} size={14} />{item.label}
        </div>
      )}
    </div>
  );
}

// ── TreeNode ──────────────────────────────────────────────────────────────────
function TreeNode({ node, depth, selId, onSelect, onToggle, onRename, onDelete, onNewNote, onNewFolder, onMove, onFolderClick, dropTargetId }) {
  const isF = node.type === "folder";
  const hasC = node.children && node.children.length > 0;
  const [ctx, setCtx] = useState(null);
  const rowRef = useRef(null);

  const isDragTarget = dropTargetId === node.id && isF;

  const handleCtx = e => {
    e.preventDefault(); e.stopPropagation();
    const items = isF ? [
      { icon: ic.plus, label: "New note here", action: () => onNewNote(node.id) },
      { icon: ic.folderPlus, label: "New subfolder", action: () => onNewFolder(node.id) },
      "sep",
      { icon: ic.edit, label: "Rename", action: () => onRename(node.id, node.label, "folder") },
      "sep",
      { icon: ic.trash, label: "Delete folder", danger: true, action: () => onDelete(node.id, "folder", node.label) },
    ] : [
      { icon: ic.eye, label: "Open note", action: () => onSelect(node) },
      { icon: ic.edit, label: "Rename", action: () => onRename(node.id, node.label, "note") },
      "sep",
      { icon: ic.pin, label: "Pin / Unpin", action: () => onSelect({ ...node, _pin: true }) },
      "sep",
      { icon: ic.trash, label: "Delete note", danger: true, action: () => onDelete(node.id, "note", node.label) },
    ];
    setCtx({ x: e.clientX, y: e.clientY, items });
  };

  const handleMouseDown = e => {
    if (e.button !== 0) return;
    if (e.target.closest(".ctx-menu")) return;
    e.preventDefault();
    dragState.id = node.id;
    dragState.label = node.label;
    window.__mouseDragStart = { x: e.clientX, y: e.clientY };
    window.__mouseDragging = false;
  };

  const handleClick = e => {
    if (window.__mouseDragging) return; // was a drag, not a click
    if (isF) { onToggle(node.id); onFolderClick(node); }
    else { onSelect(node); }
  };

  return (
    <div data-nodeid={node.id} data-nodetype={node.type}>
      {ctx && <ContextMenu x={ctx.x} y={ctx.y} items={ctx.items} onClose={() => setCtx(null)} />}
      <div
        ref={rowRef}
        className={`tree-row${selId === node.id ? " sel" : ""}${isDragTarget ? " drag-over" : ""}`}
        style={{ paddingLeft: 8 + depth * 14 }}
        onClick={handleClick}
        onContextMenu={handleCtx}
      >
        <span className="drag-handle" onMouseDown={handleMouseDown} title="Drag to move">
          <svg width="10" height="14" viewBox="0 0 10 14" fill="var(--t2)">
            <circle cx="3" cy="3" r="1.2"/><circle cx="7" cy="3" r="1.2"/>
            <circle cx="3" cy="7" r="1.2"/><circle cx="7" cy="7" r="1.2"/>
            <circle cx="3" cy="11" r="1.2"/><circle cx="7" cy="11" r="1.2"/>
          </svg>
        </span>
        {isF ? (
          <span className={`tree-chevron${node.expanded ? " open" : ""}`} style={{ width: 14, display: "flex", alignItems: "center" }}>
            {hasC ? <Icon d={ic.chevronRight} size={12} /> : <span style={{ width: 12 }} />}
          </span>
        ) : <span style={{ width: 14 }} />}
        <span className={isF ? "folder-ic" : "file-ic"}>
          <Icon d={isF ? (node.expanded ? ic.folderOpen : ic.folder) : ic.file} size={14} />
        </span>
        <span className="tree-lbl">{node.label}</span>
        {node.pinned && <span className="tree-pin"><Icon d={ic.pin} size={10} fill="var(--rose)" stroke="var(--rose)" /></span>}
      </div>
      {isF && node.expanded && node.children && (
        <div className="tree-children">
          {[...node.children].sort((a,b)=>{
            if(a.type===b.type)return 0;
            return a.type==="folder"?1:-1;
          }).map(c => (
            <TreeNode key={c.id} node={c} depth={depth + 1} selId={selId}
              onSelect={onSelect} onToggle={onToggle}
              onRename={onRename} onDelete={onDelete}
              onNewNote={onNewNote} onNewFolder={onNewFolder}
              onMove={onMove} onFolderClick={onFolderClick}
              dropTargetId={dropTargetId} />
          ))}
        </div>
      )}
    </div>
  );
}

// ── KnowledgeGraph ────────────────────────────────────────────────────────────
function KnowledgeGraph({ tree }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.offsetWidth || 600, H = 200;
    canvas.width = W; canvas.height = H;
    const items = flattenTree(tree).filter(n => n.type === "folder").slice(0, 9);
    const colors = ["#a78bfa", "#22d3ee", "#fbbf24", "#34d399", "#f472b6", "#f97316", "#60a5fa", "#e879f9", "#a3e635"];
    const nodes = items.map((n, i) => ({
      x: i === 0 ? W * 0.5 : W * (0.5 + 0.4 * Math.cos(2 * Math.PI * (i - 1) / Math.min(items.length - 1, 8))),
      y: i === 0 ? H * 0.5 : H * (0.5 + 0.38 * Math.sin(2 * Math.PI * (i - 1) / Math.min(items.length - 1, 8))),
      r: i === 0 ? 14 : 9, label: n.label.slice(0, 11), color: colors[i % colors.length]
    }));
    const edges = nodes.slice(1).map((_, i) => [0, i + 1]);
    let raf, t = 0;
    const draw = ts => {
      t = ts; ctx.clearRect(0, 0, W, H);
      edges.forEach(([a, b]) => {
        if (!nodes[b]) return;
        ctx.strokeStyle = `rgba(124,106,247,${0.18 + 0.12 * Math.sin(t / 1200 + a)})`;
        ctx.lineWidth = 1; ctx.setLineDash([4, 4]); ctx.lineDashOffset = -t / 55;
        ctx.beginPath(); ctx.moveTo(nodes[a].x, nodes[a].y); ctx.lineTo(nodes[b].x, nodes[b].y); ctx.stroke();
      });
      ctx.setLineDash([]);
      nodes.forEach(n => {
        ctx.fillStyle = n.color + "20"; ctx.strokeStyle = n.color; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#f0f2ff"; ctx.font = "10px Inter"; ctx.textAlign = "center";
        ctx.fillText(n.label, n.x, n.y + n.r + 12);
      });
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf);
  }, [tree]);
  return <canvas ref={ref} style={{ width: "100%", height: 200, display: "block" }} />;
}

// ── NoteEditor ────────────────────────────────────────────────────────────────
function NoteEditor({ note, noteId, tree, onUpdate, onDelete, onToast }) {
  const [title, setTitle] = useState(note.title || "");
  const [content, setContent] = useState(note.content || "");
  const [tags, setTags] = useState(note.tags || []);
  const [pinned, setPinned] = useState(note.pinned || false);
  const [archived, setArchived] = useState(note.archived || false);
  const [color, setColor] = useState(note.color || "");
  const [preview, setPreview] = useState(true); // ← DEFAULT PREVIEW ON
  const [saved, setSaved] = useState(true);
  const timer = useRef(null);

  useEffect(() => {
    setTitle(note.title || ""); setContent(note.content || ""); setTags(note.tags || []);
    setPinned(note.pinned || false); setArchived(note.archived || false); setColor(note.color || "");
    setPreview(true); // ← always open in preview
  }, [noteId]);

  const save = (t, c, tg, p, ar, cl) => {
    const wc = c.trim() ? c.trim().split(/\s+/).length : 0;
    onUpdate(noteId, { title: t, content: c, tags: tg, pinned: p, archived: ar, color: cl, wordCount: wc, updated: new Date().toISOString().split("T")[0] });
    setSaved(true);
  };
  const sched = (t, c, tg, p, ar, cl) => { setSaved(false); clearTimeout(timer.current); timer.current = setTimeout(() => save(t, c, tg, p, ar, cl), 700); };

  const words = content.trim() ? content.trim().split(/\s+/).length : 0;
  const COLORS = ["", "#FFF3CD", "#D4EDDA", "#CCE5FF", "#F8D7DA", "#E2D9F3", "#FFE4CC"];

  // ── Smart content type detection ──────────────────────────────────────────
  const contentType = (() => {
    const trimmed = content.trim();
    if (!trimmed) return "empty";
    // Full HTML document or rich HTML snippet
    if (trimmed.startsWith("<!DOCTYPE") || trimmed.startsWith("<html")) return "html-doc";
    // HTML snippet (starts with a tag like <div, <table, <p, <h1 etc.)
    if (/^<[a-zA-Z]/.test(trimmed) && trimmed.includes("</")) return "html-snippet";
    return "markdown";
  })();

  // ── Render preview based on content type ─────────────────────────────────
  const renderPreview = () => {
    if (contentType === "html-doc") {
      // Full HTML doc → render in sandboxed iframe
      return (
        <iframe
          srcDoc={content}
          style={{ width: "100%", minHeight: 600, border: "none", borderRadius: 8, background: "#fff" }}
          sandbox="allow-scripts allow-same-origin"
          title="HTML Preview"
        />
      );
    }
    if (contentType === "html-snippet") {
      // HTML snippet → render directly with dark theme wrapper
      return (
        <div style={{ background: "var(--bg3)", borderRadius: 8, padding: 16, minHeight: 200 }}
          dangerouslySetInnerHTML={{ __html: content }} />
      );
    }
    // Markdown (default)
    return <div className="md-view" dangerouslySetInnerHTML={{ __html: renderMD(content) }} />;
  };

  const [tagInput, setTagInput] = useState(false);
  const [tagVal, setTagVal] = useState("");
  const addTag = () => setTagInput(true);
  const submitTag = () => {
    if (tagVal.trim()) { const nt = [...new Set([...tags, tagVal.trim().toLowerCase()])]; setTags(nt); sched(title, content, nt, pinned, archived, color); }
    setTagVal(""); setTagInput(false);

  const removeTag = tg => { const nt = tags.filter(x => x !== tg); setTags(nt); sched(title, content, nt, pinned, archived, color); };

  const copyContent = () => { navigator.clipboard.writeText(content); onToast("Copied to clipboard", ic.check); };

    const wc = content.trim() ? content.trim().split(/\s+/).length : 0;

    const html = `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>${title||"Note"}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

</head><body><div class="page">${pathCrumb}<h1 class="note-title">${title||"Untitled"}</h1>

    const a = document.createElement("a");

        <div className="content">
          {nodePath.length > 0 && (
            <div className="breadcrumb">
              {nodePath.map((p, i) => <span key={i}>{i > 0 && <span className="sep"> › </span>}{p}</span>)}
              <span className="sep"> › </span>
              <span style={{ color: "var(--t1)" }}>{title || "Untitled"}</span>
            </div>
          )}
          <input className="note-h1" value={title} placeholder="Note title…"
            onChange={e => { setTitle(e.target.value); sched(e.target.value, content, tags, pinned, archived, color); }} />
          <div className="note-meta">
            <div className="meta-chip"><Icon d={ic.clock} size={12} />{note.created || "—"}</div>
            <div className="meta-chip"><Icon d={ic.edit} size={12} />Updated {note.updated || "—"}</div>
            <div className="meta-chip"><Icon d={ic.eye} size={12} />{Math.max(1, Math.ceil(words / 200))} min read</div>
            {tags.map(t => <span key={t} className="tag" onClick={() => removeTag(t)} title="Click to remove">{t} ×</span>)}
            {tagInput ? (
              <input autoFocus value={tagVal} onChange={e => setTagVal(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") submitTag(); if (e.key === "Escape") { setTagInput(false); setTagVal(""); } }}
                onBlur={submitTag}
                placeholder="tag name…"
                style={{ fontSize: 11, padding: "2px 8px", borderRadius: 99, border: "1px solid var(--accent)", background: "var(--bg3)", color: "var(--t0)", outline: "none", width: 90, fontFamily: "var(--font)" }} />
            ) : (
              <span className="tag add" onClick={addTag}>+ tag</span>
            )}
            {pinned && <span className="badge badge-purple">Pinned</span>}
            {archived && <span className="badge badge-amber">Archived</span>}
          </div>
          {preview ? (
            renderPreview()
          ) : (
            <textarea className="note-textarea" value={content} placeholder={"Start writing…\n\nMarkdown supported:\n# Heading  **bold**  `code`\n- Bullet list\n> Blockquote\n\nPaste full HTML — it will render automatically in preview!"}
              onChange={e => { setContent(e.target.value); sched(title, e.target.value, tags, pinned, archived, color); }} />
          )}
        </div>
      </div>
      <div className="word-count-bar">
        <span>{words} words</span>
        <span>·</span>
        <span>{content.length} chars</span>
        <span>·</span>
        <span>{Math.max(1, Math.ceil(words / 200))} min read</span>
        {!saved && <span style={{ marginLeft: "auto", color: "var(--amber)" }}>● Unsaved changes</span>}
      </div>
    </div>
  );
}

// ── AI Assistant ──────────────────────────────────────────────────────────────
function AIAssistant({ notes }) {
  const [msgs, setMsgs] = useState([{ role: "assistant", content: "Hello! I'm your AI Knowledge Assistant.\n\nI have full access to all your notes — ask me to **summarize**, **explain**, **connect ideas**, or **create a study plan** from any topic.\n\nWhat would you like to explore?" }]);
  const [input, setInput] = useState(""), [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const ctx = Object.entries(notes).map(([_, n]) => `[${n.title}]:\n${(n.content || "").slice(0, 600)}`).join("\n\n---\n\n");
  const send = useCallback(async text => {
    if (!text.trim() || loading) return;
    const um = { role: "user", content: text };
    setMsgs(m => [...m, um]); setInput(""); setLoading(true);
    try {
      const history = [...msgs, um].map(m => ({ role: m.role, content: m.content }));
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1500, system: `You are an AI Knowledge Assistant built into a Personal Knowledge OS. You have full access to the user's notes below. Help them understand, summarize, connect, and study their knowledge.\n\nUser's Notes:\n\n${ctx}\n\nBe helpful, insightful, and concise. Use markdown for formatting.`, messages: history }),
      });
      const data = await res.json();
      setMsgs(m => [...m, { role: "assistant", content: data.content?.map(b => b.text || "").join("") || "No response." }]);
    } catch { setMsgs(m => [...m, { role: "assistant", content: "⚠️ Connection error. Please try again." }]); }
    setLoading(false);
  }, [msgs, loading, ctx]);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);
  const suggestions = ["Summarize my SAP FICO notes", "What is RAG and how does it work?", "Create a study plan for my Python notes", "Compare LLM and RAG approaches", "What topics should I learn next?", "Find connections between my notes"];
  return (
    <div className="chat-wrap">
      <div className="chat-hdr">
        <div style={{ width: 30, height: 30, borderRadius: "50%", background: "linear-gradient(135deg,var(--accent),var(--teal))", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon d={ic.sparkle} size={15} stroke="#fff" />
        </div>
        <div><div className="chat-hdr-title">AI Knowledge Assistant</div><div style={{ fontSize: 11, color: "var(--emerald)" }}>● Powered by Claude · Has access to all your notes</div></div>
      </div>
      <div className="chat-msgs">
        {msgs.map((msg, i) => (
          <div key={i} className={`cmsg ${msg.role}`}>
            <div className={`cavatar ${msg.role === "assistant" ? "ai" : "user"}`}>
              {msg.role === "assistant" ? <Icon d={ic.sparkle} size={13} stroke="#fff" /> : "U"}
            </div>
            <div className={`cbubble ${msg.role === "assistant" ? "ai" : "user"}`}
              dangerouslySetInnerHTML={{ __html: renderMD(msg.content) }} />
          </div>
        ))}
        {loading && (
          <div className="cmsg assistant">
            <div className="cavatar ai"><Icon d={ic.sparkle} size={13} stroke="#fff" /></div>
            <div className="cbubble ai" style={{ display: "flex", gap: 4, alignItems: "center" }}>
              <span className="tdot" /><span className="tdot" /><span className="tdot" />
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="chat-sugg">
        <div className="sugg-lbl">Suggestions</div>
        <div className="sugg-chips">{suggestions.map((s, i) => <span key={i} className="chip" onClick={() => send(s)}>{s}</span>)}</div>
      </div>
      <div className="chat-inp-row">
        <textarea className="chat-ta" rows={1} placeholder="Ask anything about your notes…" value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(input); } }} />
        <button className="chat-send" onClick={() => send(input)}><Icon d={ic.send} size={17} stroke="#fff" /></button>
      </div>
    </div>
  );
}

// ── GlobalSearch ──────────────────────────────────────────────────────────────
function GlobalSearch({ notes, tree, onOpenNote }) {
  const [q, setQ] = useState(""), [filter, setFilter] = useState("all");
  const all = flattenTree(tree);
  const hl = t => q.trim() ? t.replace(new RegExp(`(${q.trim().replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi"), "<mark>$1</mark>") : t;
  const results = q.trim().length < 2 ? [] : all.filter(n => {
    const note = notes[n.id];
    const match = n.label.toLowerCase().includes(q.toLowerCase()) || (note && ((note.content || "").toLowerCase().includes(q.toLowerCase()) || (note.tags || []).join(" ").toLowerCase().includes(q.toLowerCase())));
    if (!match) return false;
    if (filter === "pinned") return note?.pinned;
    if (filter === "archived") return note?.archived;
    if (filter === "notes") return n.type === "note";
    if (filter === "folders") return n.type === "folder";
    return true;
  }).slice(0, 15);
  return (
    <div className="content" style={{ paddingTop: 28 }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 20, fontWeight: 700, color: "var(--t0)", marginBottom: 4 }}>Global Search</div>
        <div style={{ fontSize: 13, color: "var(--t2)" }}>Search all notes, folders, tags and content</div>
      </div>
      <div className="sbar">
        <Icon d={ic.search} size={18} stroke="var(--t2)" />
        <input className="sinput" placeholder="Search anything…" value={q} onChange={e => setQ(e.target.value)} autoFocus />
        {q && <div style={{ cursor: "pointer" }} onClick={() => setQ("")}><Icon d={ic.close} size={16} stroke="var(--t2)" /></div>}
      </div>
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
        {["all", "notes", "folders", "pinned", "archived"].map(f => (
          <button key={f} className={`tbtn${filter === f ? " on" : ""}`} onClick={() => setFilter(f)} style={{ fontSize: 12, padding: "4px 10px" }}>
            {f.charAt(0).toUpperCase() + f.slice(1)}
          </button>
        ))}
        {q.trim().length >= 2 && <span style={{ marginLeft: "auto", fontSize: 12, color: "var(--t2)", alignSelf: "center" }}>{results.length} result{results.length !== 1 ? "s" : ""}</span>}
      </div>
      {results.map(node => (
        <div key={node.id} className="sresult" onClick={() => node.type === "note" && onOpenNote(node.id)}>
          <div className="sric"><Icon d={node.type === "folder" ? ic.folder : ic.file} size={15} stroke={node.type === "folder" ? "var(--amber)" : "var(--teal)"} /></div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div className="sr-title" dangerouslySetInnerHTML={{ __html: hl(node.label) }} />
            <div className="sr-path">{node.path.join(" › ")}</div>
            {notes[node.id] && <div className="sr-prev" dangerouslySetInnerHTML={{ __html: hl((notes[node.id].content || "").replace(/[#*`>]/g, "").slice(0, 220)) }} />}
          </div>
          {notes[node.id]?.pinned && <Icon d={ic.pin} size={12} fill="var(--rose)" stroke="var(--rose)" />}
        </div>
      ))}
      {q.trim().length >= 2 && results.length === 0 && (
        <div className="empty-state">
          <div className="empty-ic"><Icon d={ic.search} size={22} stroke="var(--t2)" /></div>
          <div className="empty-title">No results for "{q}"</div>
          <div className="empty-sub">Try different keywords or check the filter</div>
        </div>
      )}
    </div>
  );
}

// ── Export ────────────────────────────────────────────────────────────────────
function Export({ notes, tree }) {
  const exportAll = () => {
    const data = JSON.stringify({ tree, notes }, null, 2);
    const a = document.createElement("a"); a.href = "data:application/json;charset=utf-8," + encodeURIComponent(data);
    a.download = "knowledge-os-backup-" + new Date().toISOString().split("T")[0] + ".json"; a.click();
  };
  const exportMD = () => {
    const md = Object.values(notes).map(n => `# ${n.title}\n\nTags: ${(n.tags || []).join(", ")}\nCreated: ${n.created} | Updated: ${n.updated}\n\n${n.content}`).join("\n\n---\n\n");
    const a = document.createElement("a"); a.href = "data:text/markdown;charset=utf-8," + encodeURIComponent(md);
    a.download = "knowledge-os-notes-" + new Date().toISOString().split("T")[0] + ".md"; a.click();
  };
  return (
    <div className="content" style={{ paddingTop: 28 }}>
      <div style={{ fontSize: 20, fontWeight: 700, color: "var(--t0)", marginBottom: 4 }}>Export</div>
      <div style={{ fontSize: 13, color: "var(--t2)", marginBottom: 28 }}>Download your notes in different formats</div>
      <div className="sec-title">Export Format</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 28 }}>
        {[
          { icon: "📦", label: "Full Backup (JSON)", desc: "All notes + folder structure. Use to restore later.", action: exportAll },
          { icon: "📝", label: "All Notes (Markdown)", desc: "Every note as a single .md file for external use.", action: exportMD },
        ].map(f => (
          <div key={f.label} className="stat-card" style={{ cursor: "pointer" }} onClick={f.action}>
            <div style={{ fontSize: 28, marginBottom: 10 }}>{f.icon}</div>
            <div style={{ fontSize: 14, fontWeight: 600, color: "var(--t0)", marginBottom: 6 }}>{f.label}</div>
            <div style={{ fontSize: 12, color: "var(--t2)", marginBottom: 14 }}>{f.desc}</div>

      <div className="sec-title">Stats</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
        {[["Notes", Object.keys(notes).length], ["Folders", flattenTree(tree).filter(n => n.type === "folder").length], ["Words", Object.values(notes).reduce((a, n) => a + (n.wordCount || 0), 0).toLocaleString()]].map(([l, v]) => (

        <div className="set-group">
          <div className="set-group-title">AI Assistant</div>
          {[["Model", "claude-sonnet-4-6"], ["Max tokens", "1,500"], ["Context", "Full notes"], ["Works in", "Claude.ai Projects"]].map(([l, v]) => (
            <div key={l} className="set-row"><div className="set-lbl">{l}</div><div className="set-val">{v}</div></div>
          ))}
        </div>
        <div className="set-group">
          <div className="set-group-title">Shortcuts</div>
          {[["New Note", "Ctrl+N"], ["New Folder", "Ctrl+Shift+N"], ["Search", "Ctrl+K"], ["Toggle Sidebar", "Ctrl+\\"]].map(([a, k]) => (
            <div key={a} className="set-row">
              <div className="set-lbl">{a}</div>
              <code style={{ fontFamily: "var(--mono)", fontSize: 11, background: "var(--bg3)", padding: "2px 7px", borderRadius: 4, border: "1px solid var(--border)", color: "var(--t1)" }}>{k}</code>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── RightPanel ────────────────────────────────────────────────────────────────
function RightPanel({ note, noteId, tree, onOpenNote }) {
  const [aiSummary, setAiSummary] = useState(""); const [loadingSummary, setLoadingSummary] = useState(false);
  useEffect(() => { setAiSummary(""); }, [noteId]);

  const getSummary = async () => {
    if (!note?.content) return;
    setLoadingSummary(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 200, messages: [{ role: "user", content: `Summarize this note in 2-3 sentences:\n\n${note.content}` }] }),
      });
      const data = await res.json();
      setAiSummary(data.content?.map(b => b.text || "").join("") || "");
    } catch { setAiSummary("Could not generate summary."); }
    setLoadingSummary(false);
  };

  if (!note) return (
    <div className="rp-sec">
      <div className="empty-state" style={{ padding: "40px 16px" }}>
        <div className="empty-ic"><Icon d={ic.file} size={20} stroke="var(--t2)" /></div>
        <div className="empty-title">No note open</div>
        <div className="empty-sub">Open a note to see details</div>
      </div>
    </div>
  );

  const nodePath = (() => { const all = flattenTree(tree); const n = all.find(x => x.id === noteId); return n ? n.path : []; })();
  const allNotes = flattenTree(tree).filter(n => n.type === "note" && n.id !== noteId).slice(0, 5);

  return (
    <>
      <div className="rp-sec">
        <div className="rp-sec-title">Properties</div>
        {[["Created", note.created || "—"], ["Updated", note.updated || "—"], ["Words", note.wordCount || 0], ["Read time", `${Math.max(1, Math.ceil((note.wordCount || 0) / 200))} min`], ["Pinned", note.pinned ? "Yes" : "No"], ["Archived", note.archived ? "Yes" : "No"]].map(([k, v]) => (
          <div key={k} className="rp-row"><span className="rp-key">{k}</span><span style={{ fontSize: 13 }}>{v}</span></div>
        ))}
      </div>
      {nodePath.length > 0 && (
        <div className="rp-sec">
          <div className="rp-sec-title">Location</div>
          <div style={{ fontSize: 12, color: "var(--t2)", lineHeight: 1.6 }}>{nodePath.join(" › ")}</div>
        </div>
      )}
      <div className="rp-sec">
        <div className="rp-sec-title">Tags</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
          {(note.tags || []).map(t => <span key={t} className="tag">{t}</span>)}
          {!(note.tags || []).length && <span style={{ fontSize: 12, color: "var(--t2)" }}>No tags</span>}
        </div>
      </div>
      {note.color && (
        <div className="rp-sec">
          <div className="rp-sec-title">Color</div>
          <div style={{ width: 20, height: 20, borderRadius: "50%", background: note.color, border: "1px solid var(--border-hi)" }} />
        </div>
      )}
      {allNotes.length > 0 && (
        <div className="rp-sec">
          <div className="rp-sec-title">Other Notes</div>
          {allNotes.map(n => (
            <div key={n.id} onClick={() => onOpenNote(n.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 0", cursor: "pointer", fontSize: 12, color: "var(--t1)" }} className="tree-row" onMouseEnter={e => e.currentTarget.style.color = "var(--t0)"} onMouseLeave={e => e.currentTarget.style.color = "var(--t1)"}>
              <Icon d={ic.file} size={12} stroke="var(--teal)" />{n.label}
            </div>
          ))}
        </div>
      )}
      <div className="rp-sec">
        <div className="rp-sec-title" style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          AI Summary
          <button className="ibtn" onClick={getSummary} title="Generate summary" style={{ padding: "2px 4px" }}>
            <Icon d={ic.sparkle} size={12} stroke="var(--accent2)" />
          </button>
        </div>
        {loadingSummary ? <div style={{ fontSize: 12, color: "var(--t2)" }}>Generating…</div> :
          aiSummary ? <div className="rp-ai">{aiSummary}</div> :
            <div style={{ fontSize: 12, color: "var(--t2)" }}>Click ✦ to generate an AI summary</div>}
      </div>
    </>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [tree, setTree] = useState(null);
  const [notes, setNotes] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeNav, setActiveNav] = useState("dashboard");
  const [sideCollapsed, setSideCollapsed] = useState(false);
  const [rightOpen, setRightOpen] = useState(true);
  const [openNote, setOpenNote] = useState(null);
  const [selId, setSelId] = useState(null);
  const [showNewNote, setShowNewNote] = useState(false);
  const [showNewFolder, setShowNewFolder] = useState(false);
  const [toast, setToast] = useState(null);
  const [dialog, setDialog] = useState(null); // { type: "confirm"|"rename", ...props }
  const toastTimer = useRef(null);

  const [syncStatus, setSyncStatus] = useState("idle");
  const isInitialLoad = useRef(true); // prevent saving seeds to Drive on first load

  // ── Load: Firebase first → localStorage → seeds (READ ONLY) ───────────
  useEffect(() => {
    (async () => {
      setSyncStatus("syncing");

      // 1. Try Firebase first (primary source of truth)
      try {
        const driveData = await gdrive.load();
        if (driveData?.tree && driveData?.notes) {
          setTree(driveData.tree);
          setNotes(driveData.notes);
          // Mirror to local cache for offline use
          await localCache.set("kos_tree", driveData.tree);
          await localCache.set("kos_notes", driveData.notes);
          setSyncStatus("synced");
          setLoading(false);
          isInitialLoad.current = false;
          return;
        }
      } catch (e) { console.warn("Firestore load failed:", e); }

      // 2. Try local cache (localStorage or window.storage)
      const cachedTree = await localCache.load("kos_tree");
      const cachedNotes = await localCache.load("kos_notes");
      if (cachedTree && cachedNotes) {
        setTree(cachedTree);
        setNotes(cachedNotes);
        setSyncStatus("error"); // Drive failed but we have local data
        setLoading(false);
        isInitialLoad.current = false;
        return;
      }

      // 3. Last resort: seeds — but do NOT save these to Drive
      // User starts fresh, their first real edit will create the Drive file
      setTree(SEED_TREE);
      setNotes(SEED_NOTES);
      setSyncStatus("idle");
      setLoading(false);
      isInitialLoad.current = false;
    })();
  }, []);

  // ── Save: only after initial load, debounced to Drive ────────────────────
  const gdriveTimer = useRef(null);
  const latestData = useRef({ tree: null, notes: null });
  const hasUserData = useRef(false); // true once user makes a real change

  useEffect(() => {
    if (!tree || !notes) return;
    if (isInitialLoad.current) return; // skip saving during load

    latestData.current = { tree, notes };
    hasUserData.current = true;

    // Always save to local cache immediately
    localCache.set("kos_tree", tree);
    localCache.set("kos_notes", notes);

    // Debounce Drive sync — 2.5s after last change
    clearTimeout(gdriveTimer.current);
    setSyncStatus("syncing");
    gdriveTimer.current = setTimeout(async () => {
      const ok = await gdrive.save(latestData.current);
      setSyncStatus(ok ? "synced" : "error");
      gdriveTimer.current = null;
    }, 2500);
  }, [tree, notes]);

  // ── Pull latest from Firebase (for live sync across devices) ────────────────
  const isPulling = useRef(false);
  const pullFromDrive = async (silent = false) => {
    if (isPulling.current) return;
    isPulling.current = true;
    if (!silent) setSyncStatus("syncing");
    try {
      const driveData = await gdrive.load();
      if (driveData?.tree && driveData?.notes) {
        // Only update if Drive has newer/different data
        const driveStr = JSON.stringify(driveData);
        const localStr = JSON.stringify({ tree, notes });
        if (driveStr !== localStr) {
          setTree(driveData.tree);
          setNotes(driveData.notes);
          await localCache.set("kos_tree", driveData.tree);
          await localCache.set("kos_notes", driveData.notes);
          if (!silent) showToast("Synced from Firebase", ic.refresh);
        }
        setSyncStatus("synced");
      }
    } catch (e) { setSyncStatus("error"); }
    isPulling.current = false;
  };

  // Auto-refresh from Drive every 30 seconds
  useEffect(() => {
    if (!tree || !notes) return;
    const interval = setInterval(() => {
      if (!gdriveTimer.current) pullFromDrive(true); // silent refresh if not currently saving
    }, 30000);
    return () => clearInterval(interval);
  }, [tree, notes]);

  const showToast = (msg, icon) => {
    setToast({ msg, icon }); clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2000);
  };

  // Keyboard shortcuts
  useEffect(() => {
    const h = e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "n" && !e.shiftKey) { e.preventDefault(); setShowNewNote(true); }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "N") { e.preventDefault(); setShowNewFolder(true); }
      if ((e.ctrlKey || e.metaKey) && e.key === "k") { e.preventDefault(); setActiveNav("search"); }
      if ((e.ctrlKey || e.metaKey) && e.key === "\\") { e.preventDefault(); setSideCollapsed(c => !c); }
    };
    window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
  }, []);

  const updateNote = (id, data) => {
    setNotes(p => ({ ...p, [id]: { ...p[id], ...data } }));
    if (data.title) setTree(t => updateTreeLabel(t, id, data.title || "Untitled"));
  };

  const deleteNote = id => {
    setNotes(p => { const n = { ...p }; delete n[id]; return n; });
    setTree(t => removeFromTree(t, id));
    setOpenNote(null); setSelId(null);
    showToast("Note deleted", ic.trash);
  };

  const confirmDeleteNote = (id, title) => {
    setDialog({
      type: "confirm",
      title: "Delete note",
      message: `Delete "${title || "Untitled"}"? This cannot be undone.`,
      confirmLabel: "Delete",
      onConfirm: () => { deleteNote(id); setDialog(null); },
      onCancel: () => setDialog(null),
    });
  };

  const createNote = (id, folderId, data) => {
    setNotes(p => ({ ...p, [id]: data }));
    setTree(t => addToFolder(t, folderId, { id, label: data.title, type: "note", tags: data.tags || [] }));
    setOpenNote(id); setSelId(id); setActiveNav("knowledge");
    showToast("Note created", ic.check);
  };

  const createFolder = (parentId, folder) => {
    if (!parentId) { setTree(t => [...t, folder]); }
    else { setTree(t => addToFolder(t, parentId, folder)); }
    showToast("Folder created", ic.check);
  };

  const renameItem = (id, currentLabel, type) => {
    setDialog({
      type: "rename", current: currentLabel, itemType: type,
      onConfirm: newLabel => {
        setTree(t => updateTreeLabel(t, id, newLabel));
        if (type === "note") setNotes(p => p[id] ? { ...p, [id]: { ...p[id], title: newLabel } } : p);
        showToast("Renamed", ic.check);
        setDialog(null);
      },
      onCancel: () => setDialog(null),
    });
  };

  const deleteFolder = (id, label) => {
    setDialog({
      type: "confirm",
      title: "Delete folder",
      message: `Delete "${label}" and all notes inside? This cannot be undone.`,
      confirmLabel: "Delete",
      onConfirm: () => {
        const folder = findNode(tree, id);
        if (folder) {
          const inside = flattenTree([folder]);
          const noteIds = inside.filter(n => n.type === "note").map(n => n.id);
          setNotes(p => { const next = { ...p }; noteIds.forEach(nid => delete next[nid]); return next; });
        }
        setTree(t => removeFromTree(t, id));
        if (selId === id) { setOpenNote(null); setSelId(null); }
        showToast("Folder deleted", ic.trash);
        setDialog(null);
      },
      onCancel: () => setDialog(null),
    });
  };

  const handleTreeDelete = (id, type, label) => {
    if (type === "folder") deleteFolder(id, label);
    else confirmDeleteNote(id, label);
  };

  const [newNoteFolder, setNewNoteFolder] = useState(null);
  const handleTreeNewNote = (folderId) => { setNewNoteFolder(folderId); setShowNewNote(true); };
  const handleTreeNewFolder = (folderId) => { setNewNoteFolder(folderId); setShowNewFolder(true); };

  const [ghost, setGhost] = useState(null); // { label, x, y }
  const [dropTargetId, setDropTargetId] = useState(null);
  const dropTargetRef = useRef(null); // always current, no stale closure

  // Global mouse tracking for drag-and-drop
  useEffect(() => {
    const onMouseMove = e => {
      if (!dragState.id) return;
      window.__mouseDragging = true;
      setGhost({ label: dragState.label, x: e.clientX, y: e.clientY });
      // Temporarily hide ghost so elementFromPoint sees what's underneath
      const ghostEl = document.querySelector("[data-drag-ghost]");
      if (ghostEl) ghostEl.style.visibility = "hidden";
      const el = document.elementFromPoint(e.clientX, e.clientY);
      if (ghostEl) ghostEl.style.visibility = "";
      const row = el?.closest("[data-nodeid]");
      let target = null;
      if (row) {
        const nodeId = row.getAttribute("data-nodeid");
        const nodeType = row.getAttribute("data-nodetype");
        if (nodeType === "folder") target = nodeId;
      }
      dropTargetRef.current = target;
      setDropTargetId(target);
    };

    const onMouseUp = e => {
      if (!dragState.id) return;
      const dragId = dragState.id;
      const targetId = dropTargetRef.current; // always fresh — ref not closure
      dragState.id = null;
      dragState.label = null;
      dropTargetRef.current = null;
      setGhost(null);
      setDropTargetId(null);
      setTimeout(() => { window.__mouseDragging = false; }, 50);
      if (targetId && targetId !== dragId) {
        handleMoveRef.current(dragId, targetId);
      }
    };

    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("mouseup", onMouseUp);
    return () => {
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    };
  }, []); // empty deps — ref always current, no stale closure

  const [folderView, setFolderView] = useState(null); // { id, label } of clicked folder

  const handleMoveRef = useRef(null);
  const handleMove = (dragId, targetFolderId) => {
    setTree(t => moveNode(t, dragId, targetFolderId));
    showToast("Moved", ic.check);
  };
  handleMoveRef.current = handleMove;

  const handleFolderClick = (folderNode) => {
    setFolderView(folderNode);
    setActiveNav("knowledge");
    setOpenNote(null);
    setSelId(folderNode.id);
  };

  const resetAll = () => {
    setDialog({
      type: "confirm",
      title: "Clear all data",
      message: "Delete ALL notes and folders and reset to defaults? This cannot be undone.",
      confirmLabel: "Clear everything",
      onConfirm: async () => {
        await storage.set("kos_tree", SEED_TREE);
        await storage.set("kos_notes", SEED_NOTES);
        setTree(SEED_TREE); setNotes(SEED_NOTES);
        setOpenNote(null); setSelId(null); setActiveNav("dashboard");
        showToast("Reset to defaults", ic.refresh);
        setDialog(null);
      },
      onCancel: () => setDialog(null),
    });
  };

  const openNote_ = id => { setOpenNote(id); setSelId(id); setActiveNav("knowledge"); };

  const showExplorer = ["knowledge", "recent", "favorites", "dashboard"].includes(activeNav);

  const navItems = [
    { id: "dashboard", icon: ic.dashboard, label: "Dashboard" },
    { id: "knowledge", icon: ic.knowledge, label: "Knowledge" },
    { id: "ai", icon: ic.ai, label: "AI Assistant" },
    { id: "search", icon: ic.search, label: "Search" },
    { id: "favorites", icon: ic.star, label: "Favorites" },
    { id: "recent", icon: ic.recent, label: "Recent" },
    { id: "revision", icon: ic.calendar, label: "Revision" },
    { id: "export", icon: ic.export, label: "Export" },
    { id: "settings", icon: ic.settings, label: "Settings" },
  ];

  const renderMain = () => {
    if (!notes || !tree) return null;
    switch (activeNav) {
      case "dashboard": return <Dashboard notes={notes} tree={tree} onOpenNote={openNote_} />;
      case "ai": return <AIAssistant notes={notes} />;
      case "search": return <GlobalSearch notes={notes} tree={tree} onOpenNote={openNote_} />;
      case "favorites": return <Favorites notes={notes} onOpenNote={openNote_} />;
      case "recent": return <Recent notes={notes} onOpenNote={openNote_} />;
      case "revision": return <Revision notes={notes} onOpenNote={openNote_} />;
      case "export": return <Export notes={notes} tree={tree} />;
      case "settings": return <Settings notes={notes} tree={tree} onReset={resetAll} />;
      case "knowledge":
        if (openNote && notes[openNote]) {
          return (
            <NoteEditor key={openNote} note={notes[openNote]} noteId={openNote} tree={tree}
              onUpdate={updateNote} onDelete={(id) => confirmDeleteNote(id, notes[id]?.title)} onToast={showToast} />
          );
        }
        if (folderView) {
          // Show all notes inside this folder
          const folderNode = findNode(tree, folderView.id);
          const allInFolder = folderNode ? flattenTree([folderNode]).filter(n => n.type === "note") : [];
          return (
            <div className="content" style={{ paddingTop: 28 }}>
              <div className="breadcrumb">
                <span onClick={() => setFolderView(null)} style={{ cursor: "pointer" }}>Knowledge</span>
                <span className="sep"> › </span>
                <span style={{ color: "var(--t0)" }}>{folderView.label}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
                <div style={{ width: 36, height: 36, borderRadius: 10, background: "rgba(251,191,36,0.15)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon d={ic.folderOpen} size={20} stroke="var(--amber)" />
                </div>
                <div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "var(--t0)", letterSpacing: "-0.4px" }}>{folderView.label}</div>
                  <div style={{ fontSize: 13, color: "var(--t2)", marginTop: 2 }}>{allInFolder.length} note{allInFolder.length !== 1 ? "s" : ""} in this folder</div>
                </div>
                <button className="btn btn-primary" style={{ marginLeft: "auto" }} onClick={() => { setNewNoteFolder(folderView.id); setShowNewNote(true); }}>
                  <Icon d={ic.plus} size={14} stroke="#fff" /> New Note
                </button>
              </div>
              {allInFolder.length === 0 ? (
                <div className="empty-state" style={{ marginTop: 40 }}>
                  <div className="empty-ic"><Icon d={ic.file} size={22} stroke="var(--t2)" /></div>
                  <div className="empty-title">No notes in this folder</div>
                  <div className="empty-sub">Create a note or drag one here from the explorer</div>
                </div>
              ) : (
                <div className="notes-grid">
                  {allInFolder.map(n => {
                    const note = notes[n.id];
                    if (!note) return null;
                    return (
                      <div key={n.id} className="note-card" onClick={() => { setOpenNote(n.id); setSelId(n.id); }}
                        style={{ borderLeft: note.color ? `3px solid ${note.color}` : undefined }}>
                        <div className="nc-title">{note.pinned && <Icon d={ic.pin} size={11} fill="var(--rose)" stroke="var(--rose)" />}{note.title}</div>
                        <div className="nc-preview">{(note.content || "").replace(/[#*`>]/g, "").trim()}</div>
                        <div className="nc-footer">
                          <div className="nc-date">{note.updated}</div>
                          <div style={{ display: "flex", gap: 3 }}>{(note.tags || []).slice(0, 2).map(t => <span key={t} className="badge badge-teal">{t}</span>)}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        }
        return (
          <div className="content">
            <div className="empty-state" style={{ marginTop: 60 }}>
              <div className="empty-ic"><Icon d={ic.book} size={26} stroke="var(--accent2)" /></div>
              <div className="empty-title">Select or create a note</div>
              <div className="empty-sub">Click a folder to see its notes, or click a note to open it</div>
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button className="btn btn-primary" onClick={() => setShowNewNote(true)}>
                  <Icon d={ic.plus} size={14} stroke="#fff" /> New Note
                </button>
                <button className="btn btn-ghost" onClick={() => setActiveNav("search")}>
                  <Icon d={ic.search} size={14} /> Search
                </button>
              </div>
            </div>
          </div>
        );
      default: return null;
    }
  };

  if (loading) return (
    <>
      <style>{CSS}</style>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", flexDirection: "column", gap: 14, background: "var(--bg0)" }}>
        <div style={{ width: 44, height: 44, background: "linear-gradient(135deg,var(--accent),var(--teal))", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 0 24px rgba(124,106,247,0.4)" }}>
          <Icon d={ic.brain} size={22} stroke="#fff" />
        </div>
        <div style={{ fontSize: 15, fontWeight: 600, color: "var(--t0)" }}>Knowledge OS</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--teal)" }}>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--teal)", animation: "pulse 1s infinite" }} />
          Loading from Firebase...
        </div>
        <div style={{ fontSize: 11, color: "var(--t2)", marginTop: 4 }}>Firestore: knowledgeOS/state</div>
      </div>
    </>
  );

  const syncInfo = {
    syncing: { color: "var(--amber)", label: "Syncing to Firebase...", dot: "var(--amber)", anim: true },
    synced:  { color: "var(--emerald)", label: "Saved to Firebase", dot: "var(--emerald)", anim: false },
    error:   { color: "var(--rose)", label: "Firebase offline", dot: "var(--rose)", anim: false },
    idle:    { color: "var(--t2)", label: "Firebase", dot: "var(--t2)", anim: false },
  }[syncStatus] || {};

  return (
    <>
      <style>{CSS}</style>
      {showNewNote && <NewNoteModal tree={tree} defaultFolderId={newNoteFolder} onClose={() => { setShowNewNote(false); setNewNoteFolder(null); }} onCreate={createNote} />}
      {showNewFolder && <NewFolderModal tree={tree} defaultFolderId={newNoteFolder} onClose={() => { setShowNewFolder(false); setNewNoteFolder(null); }} onCreate={createFolder} />}
      {dialog?.type === "confirm" && <ConfirmModal title={dialog.title} message={dialog.message} confirmLabel={dialog.confirmLabel} onConfirm={dialog.onConfirm} onCancel={dialog.onCancel} />}
      {dialog?.type === "rename" && <RenameModal current={dialog.current} type={dialog.itemType} onConfirm={dialog.onConfirm} onCancel={dialog.onCancel} />}
      {toast && <Toast msg={toast.msg} icon={toast.icon} />}
      {ghost && <DragGhost label={ghost.label} x={ghost.x} y={ghost.y} />}

      <div className="app">
        {/* Sidebar */}
        <div className={`sidebar${sideCollapsed ? " collapsed" : ""}`}>
          <div className="slogo">
            <div className="slogo-mark"><Icon d={ic.brain} size={16} stroke="#fff" /></div>
            <div className="slogo-text">Know<span>ledge</span> OS</div>
          </div>
          <div className="snav">
            {navItems.map(item => (
              <div key={item.id} className={`nav-item${activeNav === item.id ? " active" : ""}`}
                onClick={() => { setActiveNav(item.id); if (item.id !== "knowledge") setOpenNote(null); }}>
                <span style={{ flexShrink: 0 }}><Icon d={item.icon} size={16} /></span>
                <span className="nav-label">{item.label}</span>
              </div>
            ))}
          </div>
          <div className="sfooter">
            <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 8px 5px 10px", borderRadius: 6, background: "var(--glass)", margin: "0 4px 4px" }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: syncInfo.dot, flexShrink: 0, animation: syncInfo.anim ? "pulse 1s infinite" : "none" }} />
              <span className="nav-label" style={{ fontSize: 11, color: syncInfo.color, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>
                {syncInfo.label}
              </span>
              {/* Manual sync button */}
              <button onClick={() => pullFromDrive(false)} title="Pull latest from Firebase"
                style={{ background: "none", border: "none", cursor: "pointer", color: "var(--t2)", padding: "1px 3px", borderRadius: 4, display: "flex", flexShrink: 0 }}
                className="nav-label">
                <Icon d={ic.refresh} size={12} />
              </button>
            </div>
            <button className="new-note-btn" onClick={() => setShowNewNote(true)}>
              <Icon d={ic.plus} size={15} />
              <span className="nav-label">New Note</span>
            </button>
            <button className="stoggle" onClick={() => setSideCollapsed(c => !c)}>
              <Icon d={sideCollapsed ? ic.chevronRight : ic.menu} size={15} />
            </button>
          </div>
        </div>

        {/* Explorer */}
        <div className={`explorer${showExplorer ? "" : " hidden"}`}>
          <div className="exp-header">
            <div className="exp-title">Explorer</div>
            <div className="exp-actions">
              <button className="ibtn" onClick={() => setShowNewNote(true)} title="New note"><Icon d={ic.plus} size={15} /></button>
              <button className="ibtn" onClick={() => setShowNewFolder(true)} title="New folder"><Icon d={ic.folderPlus} size={15} /></button>
            </div>
          </div>
          <div className="tree-wrap">
            {tree.map(node => (
              <TreeNode key={node.id} node={node} depth={0} selId={selId}
                onSelect={n => {
                  if (n._pin) { updateNote(n.id, { pinned: !notes[n.id]?.pinned }); showToast(notes[n.id]?.pinned ? "Unpinned" : "Pinned", ic.pin); return; }
                  setSelId(n.id); setFolderView(null);
                  if (notes[n.id]) { setOpenNote(n.id); setActiveNav("knowledge"); }
                }}
                onToggle={id => setTree(t => toggleExpand(t, id))}
                onRename={renameItem}
                onDelete={handleTreeDelete}
                onNewNote={handleTreeNewNote}
                onNewFolder={handleTreeNewFolder}
                onMove={handleMove}
                onFolderClick={handleFolderClick}
                dropTargetId={dropTargetId} />
            ))}
          </div>
        </div>

        {/* Main */}
        <div className="main">{renderMain()}</div>

        {/* Right Panel */}
        {activeNav === "knowledge" && (
          <div className={`rpanel${rightOpen ? "" : " hidden"}`}>
            {openNote && notes[openNote] ? (
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", borderBottom: "1px solid var(--border)" }}>
                <span style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, color: "var(--t2)" }}>Properties</span>
                <button className="ibtn" onClick={() => setRightOpen(false)}><Icon d={ic.close} size={14} /></button>
              </div>
            ) : null}
            <RightPanel note={openNote ? notes[openNote] : null} noteId={openNote} tree={tree} onOpenNote={openNote_} />
          </div>
        )}
        {activeNav === "knowledge" && !rightOpen && (
          <button className="ibtn" style={{ position: "absolute", right: 8, top: 54, background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 6, padding: 6 }}
            onClick={() => setRightOpen(true)} title="Show properties">
            <Icon d={ic.eye} size={14} />
          </button>
        )}
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
