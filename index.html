// ── AI Assistant ──────────────────────────────────────────────────────────────
function AIAssistant({ notes }) {
  const [msgs, setMsgs] = useState([{ role: "assistant", content: "Hello! I'm your AI Knowledge Assistant.\n\nI have full access to all your notes — ask me to **summarize**, **explain**, **connect ideas**, or **create a study plan** from any topic.\n\nWhat would you like to explore?" }]);
  const [input, setInput] = useState(""), [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const ctx = Object.entries(notes).map(([_, n]) => `[${n.title}]:\n${(n.content || "").slice(0, 600)}`).join("\n\n---\n\n");
  const send = useCallback(async text => {
    if (!text.trim() || loading) return;
    const um = { role: "user", content: text };
    setMsgs(m => [...m, um]); setInput(""); setLoading(true);
    try {
      const history = [...msgs, um].map(m => ({ role: m.role, content: m.content }));
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1500, system: `You are an AI Knowledge Assistant built into a Personal Knowledge OS. You have full access to the user's notes below. Help them understand, summarize, connect, and study their knowledge.\n\nUser's Notes:\n\n${ctx}\n\nBe helpful, insightful, and concise. Use markdown for formatting.`, messages: history }),
      });
      const data = await res.json();
      setMsgs(m => [...m, { role: "assistant", content: data.content?.map(b => b.text || "").join("") || "No response." }]);
    } catch { setMsgs(m => [...m, { role: "assistant", content: "⚠️ Connection error. Please try again." }]); }
    setLoading(false);
  }, [msgs, loading, ctx]);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [msgs, loading]);
  const suggestions = ["Summarize my SAP FICO notes", "What is RAG and how does it work?", "Create a study plan for my Python notes", "Compare LLM and RAG approaches", "What topics should I learn next?", "Find connections between my notes"];
  return (
    <div className="chat-wrap">
      <div className="chat-hdr">
        <div style={{ width: 30, height: 30, borderRadius: "50%", background: "linear-gradient(135deg,var(--accent),var(--teal))", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon d={ic.sparkle} size={15} stroke="#fff" />
        </div>
        <div><div className="chat-hdr-title">AI Knowledge Assistant</div><div style={{ fontSize: 11, color: "var(--emerald)" }}>● Powered by Claude · Has access to all your notes</div></div>
      </div>
      <div className="chat-msgs">
        {msgs.map((msg, i) => (
          <div key={i} className={`cmsg ${msg.role}`}>
            <div className={`cavatar ${msg.role === "assistant" ? "ai" : "user"}`}>
              {msg.role === "assistant" ? <Icon d={ic.sparkle} size={13} stroke="#fff" /> : "U"}
            </div>
            <div className={`cbubble ${msg.role === "assistant" ? "ai" : "user"}`}
              dangerouslySetInnerHTML={{ __html: renderMD(msg.content) }} />
          </div>
        ))}
        {loading && (
          <div className="cmsg assistant">
            <div className="cavatar ai"><Icon d={ic.sparkle} size={13} stroke="#fff" /></div>
            <div className="cbubble ai" style={{ display: "flex", gap: 4, alignItems: "center" }}>
              <span className="tdot" /><span className="tdot" /><span className="tdot" />
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="chat-sugg">
        <div className="sugg-lbl">Suggestions</div>
        <div className="sugg-chips">{suggestions.map((s, i) => <span key={i} className="chip" onClick={() => send(s)}>{s}</span>)}</div>
      </div>
      <div className="chat-inp-row">
        <textarea className="chat-ta" rows={1} placeholder="Ask anything about your notes…" value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(input); } }} />
        <button className="chat-send" onClick={() => send(input)}><Icon d={ic.send} size={17} stroke="#fff" /></button>
      </div>
    </div>
  );
}

// ── GlobalSearch ──────────────────────────────────────────────────────────────
function GlobalSearch({ notes, tree, onOpenNote }) {
  const [q, setQ] = useState(""), [filter, setFilter] = useState("all"), [tagFilter, setTagFilter] = useState(null);
  const inputRef = React.useRef(null);
  const all = flattenTree(tree);

  const allTags = [...new Set(Object.values(notes || {}).flatMap(n => n.tags || []))].sort();

  const hl = t => q.trim()
    ? t.replace(new RegExp(`(${q.trim().replace(/[.*+?^${}()|[\]\\]/g, "\\$&")})`, "gi"), "<mark>$1</mark>")
    : t;

  // Smart snippet: find the sentence/window around the first match
  const snippet = (content, maxLen = 240) => {
    const clean = (content || "").replace(/[#*`>~\[\]]/g, "").replace(/\n+/g, " ").trim();
    if (!q.trim()) return clean.slice(0, maxLen);
    const idx = clean.toLowerCase().indexOf(q.toLowerCase());
    if (idx === -1) return clean.slice(0, maxLen);
    const start = Math.max(0, idx - 80);
    const end = Math.min(clean.length, idx + maxLen - 80);
    return (start > 0 ? "…" : "") + clean.slice(start, end) + (end < clean.length ? "…" : "");
  };

  const results = q.trim().length < 2 ? [] : all.filter(n => {
    const note = notes[n.id];
    const matchQ = n.label.toLowerCase().includes(q.toLowerCase()) ||
      (note && ((note.content || "").toLowerCase().includes(q.toLowerCase()) ||
        (note.tags || []).join(" ").toLowerCase().includes(q.toLowerCase())));
    if (!matchQ) return false;
    if (filter === "pinned") return note?.pinned;
    if (filter === "archived") return note?.archived;
    if (filter === "notes") return n.type === "note";
    if (filter === "folders") return n.type === "folder";
    if (tagFilter) return (note?.tags || []).includes(tagFilter);
    return true;
  }).slice(0, 20);

  // Keyboard shortcut: focus search on Ctrl/Cmd+K (already wired in App, but autofocus on mount too)
  useEffect(() => { inputRef.current?.focus(); }, []);

  return (
    <div className="content" style={{ paddingTop: 28, maxWidth: 720 }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 22, fontWeight: 700, color: "var(--t0)", letterSpacing: "-0.4px", marginBottom: 4 }}>Search</div>
        <div style={{ fontSize: 13, color: "var(--t2)" }}>Search across all notes, folders, tags and content</div>
      </div>

      {/* Search bar */}
      <div className="sbar" style={{ marginBottom: 12 }}>
        <Icon d={ic.search} size={18} stroke="var(--t2)" />
        <input ref={inputRef} className="sinput" placeholder="Search anything… (Ctrl+K)" value={q} onChange={e => setQ(e.target.value)} />
        {q && <button style={{ background:"none",border:"none",cursor:"pointer",padding:0,display:"flex" }} onClick={() => setQ("")}><Icon d={ic.close} size={16} stroke="var(--t2)" /></button>}
      </div>

      {/* Filter row */}
      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap", alignItems: "center" }}>
        {["all", "notes", "folders", "pinned", "archived"].map(f => (
          <button key={f} className={`tag-chip${filter === f ? " active" : ""}`} onClick={() => setFilter(f)}>
            {f.charAt(0).toUpperCase() + f.slice(1)}
          </button>
        ))}
        {q.trim().length >= 2 && (
          <span style={{ marginLeft: "auto", fontSize: 12, color: "var(--t2)" }}>
            {results.length} result{results.length !== 1 ? "s" : ""}
          </span>
        )}
      </div>

      {/* Tag chips */}
      {allTags.length > 0 && (
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 16 }}>
          {allTags.map(t => (
            <button key={t} className={`tag-chip${tagFilter === t ? " active" : ""}`}
              onClick={() => setTagFilter(tf => tf === t ? null : t)}>
              #{t}
            </button>
          ))}
        </div>
      )}

      {/* Results */}
      {results.map(node => {
        const note = notes[node.id];
        return (
          <div key={node.id} className="sresult" onClick={() => node.type === "note" && onOpenNote(node.id)}>
            <div className="sric">
              <Icon d={node.type === "folder" ? ic.folder : ic.file} size={15}
                stroke={node.type === "folder" ? "var(--amber)" : "var(--teal)"} />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
                <div className="sr-title" dangerouslySetInnerHTML={{ __html: hl(node.label) }} />
                {note?.pinned && <Icon d={ic.pin} size={11} fill="var(--rose)" stroke="var(--rose)" />}
                {(note?.tags || []).map(t => (
                  <span key={t} className="badge badge-teal" style={{ fontSize: 10 }}>{t}</span>
                ))}
              </div>
              <div className="sr-path">{node.path.join(" › ")}</div>
              {note && (
                <div className="sr-prev" dangerouslySetInnerHTML={{ __html: hl(snippet(note.content)) }} />
              )}
              {note && (
                <div style={{ display: "flex", gap: 10, marginTop: 4, fontSize: 10, color: "var(--t2)" }}>
                  {note.updated && <span>Updated {note.updated}</span>}
                  {note.wordCount > 0 && <span>{note.wordCount} words</span>}
                </div>
              )}
            </div>
          </div>
        );
      })}

      {q.trim().length >= 2 && results.length === 0 && (
        <div className="empty-state">
          <div className="empty-ic"><Icon d={ic.search} size={22} stroke="var(--t2)" /></div>
          <div className="empty-title">No results for &ldquo;{q}&rdquo;</div>
          <div className="empty-sub">Try different keywords, remove filters, or check spelling</div>
        </div>
      )}

      {q.trim().length < 2 && (
        <div className="empty-state" style={{ paddingTop: 40 }}>
          <div className="empty-ic"><Icon d={ic.search} size={22} stroke="var(--t2)" /></div>
          <div className="empty-title">Type to search</div>
          <div className="empty-sub">Search across titles, content, and tags. Use filters to narrow down.</div>
        </div>
      )}
    </div>
  );
}

// ── Favorites ─────────────────────────────────────────────────────────────────
function Favorites({ notes, onOpenNote }) {

  return (

    if (!note?.content) return;
    setLoadingSummary(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 200, messages: [{ role: "user", content: `Summarize this note in 2-3 sentences:\n\n${note.content}` }] }),
      });
      const data = await res.json();
      setAiSummary(data.content?.map(b => b.text || "").join("") || "");

  return (

          <div className="rp-sec-title">Location</div>

        <div className="rp-sec-title">Tags</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
          {(note.tags || []).map(t => <span key={t} className="tag">{t}</span>)}

        <div className="rp-sec">

            <div key={n.id} onClick={() => onOpenNote(n.id)} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 0", cursor: "pointer", fontSize: 12, color: "var(--t1)" }} className="tree-row" onMouseEnter={e => e.currentTarget.style.color = "var(--t0)"} onMouseLeave={e => e.currentTarget.style.color = "var(--t1)"}>
              <Icon d={ic.file} size={12} stroke="var(--teal)" />{n.label}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [tree, setTree] = useState(null);
  const [notes, setNotes] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeNav, setActiveNav] = useState("dashboard");
  const [sideCollapsed, setSideCollapsed] = useState(false);
  const [rightOpen, setRightOpen] = useState(false);
  const [openNote, setOpenNote] = useState(null);
  const [mobileNoteFocus, setMobileNoteFocus] = useState(false);
  const [selId, setSelId] = useState(null);
  const [showNewNote, setShowNewNote] = useState(false);
  const [showNewFolder, setShowNewFolder] = useState(false);
  const [toast, setToast] = useState(null);
  const [dialog, setDialog] = useState(null); // { type: "confirm"|"rename", ...props }
  const toastTimer = useRef(null);

  const [syncStatus, setSyncStatus] = useState("idle");
  const isInitialLoad = useRef(true); // prevent saving seeds to Drive on first load

  // ── Theme (light / dark) ─────────���──────────────────────────────────────────
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem("kos_theme") || "dark"; } catch { return "dark"; }
  });
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    document.documentElement.style.background = theme === "light" ? "#f4f4f7" : "#0a0b0f";
    try { localStorage.setItem("kos_theme", theme); } catch {}
  }, [theme]);
  const toggleTheme = () => setTheme(t => (t === "light" ? "dark" : "light"));

  // ── Load: Firebase first → localStorage → seeds (READ ONLY) ───────────
  useEffect(() => {
    (async () => {
      setSyncStatus("syncing");

      // 1. Try Firebase first (primary source of truth)
      try {
        const driveData = await gdrive.load();
        if (driveData?.tree && driveData?.notes) {
          setTree(driveData.tree);
          setNotes(driveData.notes);
          // Mirror to local cache for offline use
          await localCache.set("kos_tree", driveData.tree);
          await localCache.set("kos_notes", driveData.notes);
          setSyncStatus("synced");
          setLoading(false);
          isInitialLoad.current = false;
          return;
        }
      } catch (e) { console.warn("Firestore load failed:", e); }

      // 2. Try local cache (localStorage or window.storage)
      const cachedTree = await localCache.load("kos_tree");
      const cachedNotes = await localCache.load("kos_notes");
      if (cachedTree && cachedNotes) {
        setTree(cachedTree);
        setNotes(cachedNotes);
        setSyncStatus("error"); // Drive failed but we have local data
        setLoading(false);
        isInitialLoad.current = false;
        return;
      }

      // 3. Last resort: seeds — but do NOT save these to Drive
      // User starts fresh, their first real edit will create the Drive file
      setTree(SEED_TREE);
      setNotes(SEED_NOTES);
      setSyncStatus("idle");
      setLoading(false);
      isInitialLoad.current = false;
    })();
  }, []);

  // ── Save: only after initial load, debounced to Drive ────────────────────
  const gdriveTimer = useRef(null);
  const latestData = useRef({ tree: null, notes: null });
  const hasUserData = useRef(false); // true once user makes a real change

  useEffect(() => {
    if (!tree || !notes) return;
    if (isInitialLoad.current) return; // skip saving during load

    latestData.current = { tree, notes };
    hasUserData.current = true;

    // Always save to local cache immediately
    localCache.set("kos_tree", tree);
    localCache.set("kos_notes", notes);

    // Debounce Drive sync — 2.5s after last change
    clearTimeout(gdriveTimer.current);
    setSyncStatus("syncing");
    gdriveTimer.current = setTimeout(async () => {
      const ok = await gdrive.save(latestData.current);
      setSyncStatus(ok ? "synced" : "error");
      gdriveTimer.current = null;
    }, 2500);
  }, [tree, notes]);

  // ── Pull latest from Firebase (for live sync across devices) ────────────────
  const isPulling = useRef(false);
  const pullFromDrive = async (silent = false) => {
    if (isPulling.current) return;
    isPulling.current = true;
    if (!silent) setSyncStatus("syncing");
    try {
      const driveData = await gdrive.load();
      if (driveData?.tree && driveData?.notes) {
        // Only update if Drive has newer/different data
        const driveStr = JSON.stringify(driveData);
        const localStr = JSON.stringify({ tree, notes });
        if (driveStr !== localStr) {
          setTree(driveData.tree);
          setNotes(driveData.notes);
          await localCache.set("kos_tree", driveData.tree);
          await localCache.set("kos_notes", driveData.notes);
          if (!silent) showToast("Synced from Firebase", ic.refresh);
        }
        setSyncStatus("synced");
      }
    } catch (e) { setSyncStatus("error"); }
    isPulling.current = false;
  };

  // Auto-refresh from Drive every 30 seconds
  useEffect(() => {
    if (!tree || !notes) return;
    const interval = setInterval(() => {
      if (!gdriveTimer.current) pullFromDrive(true); // silent refresh if not currently saving
    }, 30000);
    return () => clearInterval(interval);
  }, [tree, notes]);

  const showToast = (msg, icon) => {
    setToast({ msg, icon }); clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2000);
  };

  // Keyboard shortcuts
  useEffect(() => {
    const h = e => {
      if ((e.ctrlKey || e.metaKey) && e.key === "n" && !e.shiftKey) { e.preventDefault(); setShowNewNote(true); }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === "N") { e.preventDefault(); setShowNewFolder(true); }
      if ((e.ctrlKey || e.metaKey) && e.key === "k") { e.preventDefault(); setActiveNav("search"); }
      if ((e.ctrlKey || e.metaKey) && e.key === "\\") { e.preventDefault(); setSideCollapsed(c => !c); }
    };
    window.addEventListener("keydown", h); return () => window.removeEventListener("keydown", h);
  }, []);

  const updateNote = (id, data) => {
    setNotes(p => ({ ...p, [id]: { ...p[id], ...data } }));
    if (data.title) setTree(t => updateTreeLabel(t, id, data.title || "Untitled"));
  };

  const deleteNote = id => {
    setNotes(p => { const n = { ...p }; delete n[id]; return n; });
    setTree(t => removeFromTree(t, id));
    setOpenNote(null); setSelId(null);
    setMobileNoteFocus(false);
    showToast("Note deleted", ic.trash);
  };

  const confirmDeleteNote = (id, title) => {
    setDialog({
      type: "confirm",
      title: "Delete note",
      message: `Delete "${title || "Untitled"}"? This cannot be undone.`,
      confirmLabel: "Delete",
      onConfirm: () => { deleteNote(id); setDialog(null); },
      onCancel: () => setDialog(null),
    });
  };

  const createNote = (id, folderId, data) => {
    setNotes(p => ({ ...p, [id]: data }));
    setTree(t => addToFolder(t, folderId, { id, label: data.title, type: "note", tags: data.tags || [] }));
    setOpenNote(id); setSelId(id); setActiveNav("knowledge"); setMobileNoteFocus(true);
    showToast("Note created", ic.check);
  };

  const createFolder = (parentId, folder) => {
    if (!parentId) { setTree(t => [...t, folder]); }
    else { setTree(t => addToFolder(t, parentId, folder)); }
    showToast("Folder created", ic.check);
  };

  const renameItem = (id, currentLabel, type) => {
    setDialog({
      type: "rename", current: currentLabel, itemType: type,
      onConfirm: newLabel => {
        setTree(t => updateTreeLabel(t, id, newLabel));
        if (type === "note") setNotes(p => p[id] ? { ...p, [id]: { ...p[id], title: newLabel } } : p);
        showToast("Renamed", ic.check);
        setDialog(null);
      },
      onCancel: () => setDialog(null),
    });
  };

  const deleteFolder = (id, label) => {
    setDialog({
      type: "confirm",
      title: "Delete folder",
      message: `Delete "${label}" and all notes inside? This cannot be undone.`,
      confirmLabel: "Delete",
      onConfirm: () => {
        const folder = findNode(tree, id);
        if (folder) {
          const inside = flattenTree([folder]);
          const noteIds = inside.filter(n => n.type === "note").map(n => n.id);
          setNotes(p => { const next = { ...p }; noteIds.forEach(nid => delete next[nid]); return next; });
        }
        setTree(t => removeFromTree(t, id));
        if (selId === id) { setOpenNote(null); setSelId(null); setMobileNoteFocus(false); }
        showToast("Folder deleted", ic.trash);
        setDialog(null);
      },
      onCancel: () => setDialog(null),
    });
  };

  const handleTreeDelete = (id, type, label) => {
    if (type === "folder") deleteFolder(id, label);
    else confirmDeleteNote(id, label);
  };

  const [newNoteFolder, setNewNoteFolder] = useState(null);
  const handleTreeNewNote = (folderId) => { setNewNoteFolder(folderId); setShowNewNote(true); };
  const handleTreeNewFolder = (folderId) => { setNewNoteFolder(folderId); setShowNewFolder(true); };

  const [ghost, setGhost] = useState(null); // { label, x, y }
  const [dropTargetId, setDropTargetId] = useState(null);
  const dropTargetRef = useRef(null); // always current, no stale closure

  // Global mouse tracking for drag-and-drop
  useEffect(() => {
    const onMouseMove = e => {
      if (!dragState.id) return;
      window.__mouseDragging = true;
      setGhost({ label: dragState.label, x: e.clientX, y: e.clientY });
      // Temporarily hide ghost so elementFromPoint sees what's underneath
      const ghostEl = document.querySelector("[data-drag-ghost]");
      if (ghostEl) ghostEl.style.visibility = "hidden";
      const el = document.elementFromPoint(e.clientX, e.clientY);
      if (ghostEl) ghostEl.style.visibility = "";
      const row = el?.closest("[data-nodeid]");
      let target = null;
      if (row) {
        const nodeId = row.getAttribute("data-nodeid");
        const nodeType = row.getAttribute("data-nodetype");
        if (nodeType === "folder") target = nodeId;
      }
      dropTargetRef.current = target;
      setDropTargetId(target);
    };

    const onMouseUp = e => {
      if (!dragState.id) return;
      const dragId = dragState.id;
      const targetId = dropTargetRef.current; // always fresh — ref not closure
      dragState.id = null;
      dragState.label = null;
      dropTargetRef.current = null;
      setGhost(null);
      setDropTargetId(null);
      setTimeout(() => { window.__mouseDragging = false; }, 50);
      if (targetId && targetId !== dragId) {
        handleMoveRef.current(dragId, targetId);
      }
    };

    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("mouseup", onMouseUp);
    return () => {
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    };
  }, []); // empty deps — ref always current, no stale closure

  const [folderView, setFolderView] = useState(null); // { id, label } of clicked folder
  const [activeTag, setActiveTag] = useState(null); // tag filter for explorer

  const handleMoveRef = useRef(null);
  const handleMove = (dragId, targetFolderId) => {
    setTree(t => moveNode(t, dragId, targetFolderId));
    showToast("Moved", ic.check);
  };
  handleMoveRef.current = handleMove;

  const handleFolderClick = (folderNode) => {
    setFolderView(folderNode);
    setActiveNav("knowledge");
    setOpenNote(null);
    setMobileNoteFocus(false);
    setSelId(folderNode.id);
  };

  const resetAll = () => {
    setDialog({
      type: "confirm",
      title: "Clear all data",
      message: "Delete ALL notes and folders and reset to defaults? This cannot be undone.",
      confirmLabel: "Clear everything",
      onConfirm: async () => {
        await storage.set("kos_tree", SEED_TREE);
        await storage.set("kos_notes", SEED_NOTES);
        setTree(SEED_TREE); setNotes(SEED_NOTES);
        setOpenNote(null); setSelId(null); setActiveNav("dashboard"); setMobileNoteFocus(false);
        showToast("Reset to defaults", ic.refresh);
        setDialog(null);
      },
      onCancel: () => setDialog(null),
    });
  };

  const openNote_ = id => { setOpenNote(id); setSelId(id); setActiveNav("knowledge"); setMobileNoteFocus(true); };

  const showExplorer = ["knowledge", "recent", "favorites", "dashboard"].includes(activeNav);

  const navItems = [
    { id: "dashboard", icon: ic.dashboard, label: "Dashboard" },
    { id: "knowledge", icon: ic.knowledge, label: "Knowledge" },
    { id: "ai", icon: ic.ai, label: "AI Assistant" },
    { id: "search", icon: ic.search, label: "Search" },
    { id: "favorites", icon: ic.star, label: "Favorites" },
    { id: "recent", icon: ic.recent, label: "Recent" },
    { id: "revision", icon: ic.calendar, label: "Revision" },
    { id: "export", icon: ic.export, label: "Export" },
    { id: "settings", icon: ic.settings, label: "Settings" },
  ];

  const renderMain = () => {
    if (!notes || !tree) return null;
    switch (activeNav) {
      case "dashboard": return <Dashboard notes={notes} tree={tree} onOpenNote={openNote_} onFolderClick={f => { handleFolderClick(f); setActiveNav("knowledge"); }} />;
      case "ai": return <AIAssistant notes={notes} />;
      case "search": return <GlobalSearch notes={notes} tree={tree} onOpenNote={openNote_} />;
      case "favorites": return <Favorites notes={notes} onOpenNote={openNote_} />;
      case "recent": return <Recent notes={notes} onOpenNote={openNote_} />;
      case "revision": return <Revision notes={notes} onOpenNote={openNote_} />;
      case "export": return <Export notes={notes} tree={tree} />;
      case "settings": return <Settings notes={notes} tree={tree} onReset={resetAll} />;
      case "knowledge":
        if (openNote && notes[openNote]) {
          return (
            <NoteEditor key={openNote} note={notes[openNote]} noteId={openNote} tree={tree}
              onUpdate={updateNote} onDelete={(id) => confirmDeleteNote(id, notes[id]?.title)} onToast={showToast}
              mobileFocus={mobileNoteFocus} onToggleMobileFocus={() => setMobileNoteFocus(v => !v)} />
          );
        }
        if (folderView) {
          // Show all notes inside this folder
          const folderNode = findNode(tree, folderView.id);
          const allInFolder = folderNode ? flattenTree([folderNode]).filter(n => n.type === "note") : [];
          return (
            <div className="content" style={{ paddingTop: 28 }}>
              <div className="breadcrumb">
                <span onClick={() => setFolderView(null)} style={{ cursor: "pointer" }}>Knowledge</span>
                <span className="sep"> › </span>
                <span style={{ color: "var(--t0)" }}>{folderView.label}</span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
                <div style={{ width: 36, height: 36, borderRadius: 10, background: "rgba(251,191,36,0.15)", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <Icon d={ic.folderOpen} size={20} stroke="var(--amber)" />
                </div>
                <div>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "var(--t0)", letterSpacing: "-0.4px" }}>{folderView.label}</div>
                  <div style={{ fontSize: 13, color: "var(--t2)", marginTop: 2 }}>{allInFolder.length} note{allInFolder.length !== 1 ? "s" : ""} in this folder</div>
                </div>
                <button className="btn btn-primary" style={{ marginLeft: "auto" }} onClick={() => { setNewNoteFolder(folderView.id); setShowNewNote(true); }}>
                  <Icon d={ic.plus} size={14} stroke="#fff" /> New Note
                </button>
              </div>
              {allInFolder.length === 0 ? (
                <div className="empty-state" style={{ marginTop: 40 }}>
                  <div className="empty-ic"><Icon d={ic.file} size={22} stroke="var(--t2)" /></div>
                  <div className="empty-title">No notes in this folder</div>
                  <div className="empty-sub">Create a note or drag one here from the explorer</div>
                </div>
              ) : (
                <div className="notes-grid">
                  {allInFolder.map(n => {
                    const note = notes[n.id];
                    if (!note) return null;
                    return (
                      <div key={n.id} className="note-card" onClick={() => { setOpenNote(n.id); setSelId(n.id); setMobileNoteFocus(true); }}
                        style={{ borderLeft: note.color ? `3px solid ${note.color}` : undefined }}>
                        <div className="nc-title">{note.pinned && <Icon d={ic.pin} size={11} fill="var(--rose)" stroke="var(--rose)" />}{note.title}</div>
                        <div className="nc-preview">{(note.content || "").replace(/[#*`>]/g, "").trim()}</div>
                        <div className="nc-footer">
                          <div className="nc-date">{note.updated}</div>
                          <div style={{ display: "flex", gap: 3 }}>{(note.tags || []).slice(0, 2).map(t => <span key={t} className="badge badge-teal">{t}</span>)}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        }
        return (
          <div className="content">
            <div className="empty-state" style={{ marginTop: 60 }}>
              <div className="empty-ic"><Icon d={ic.book} size={26} stroke="var(--accent2)" /></div>
              <div className="empty-title">Select or create a note</div>
              <div className="empty-sub">Click a folder to see its notes, or click a note to open it</div>
              <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                <button className="btn btn-primary" onClick={() => setShowNewNote(true)}>
                  <Icon d={ic.plus} size={14} stroke="#fff" /> New Note
                </button>
                <button className="btn btn-ghost" onClick={() => setActiveNav("search")}>
                  <Icon d={ic.search} size={14} /> Search
                </button>
              </div>
            </div>
          </div>
        );
      default: return null;
    }
  };

  if (loading) return (
    <>
      <style>{CSS}</style>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", flexDirection: "column", gap: 14, background: "var(--bg0)" }}>
        <div style={{ width: 44, height: 44, background: "linear-gradient(135deg,var(--accent),var(--teal))", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 0 24px rgba(124,106,247,0.4)" }}>
          <Icon d={ic.brain} size={22} stroke="#fff" />
        </div>
        <div style={{ fontSize: 15, fontWeight: 600, color: "var(--t0)" }}>Knowledge OS</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--teal)" }}>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: "var(--teal)", animation: "pulse 1s infinite" }} />
          Loading from Firebase...
        </div>
        <div style={{ fontSize: 11, color: "var(--t2)", marginTop: 4 }}>Firestore: knowledgeOS/state</div>
      </div>
    </>
  );

  const syncInfo = {
    syncing: { color: "var(--amber)", label: "Syncing to Firebase...", dot: "var(--amber)", anim: true },
    synced:  { color: "var(--emerald)", label: "Saved to Firebase", dot: "var(--emerald)", anim: false },
    error:   { color: "var(--rose)", label: "Firebase offline", dot: "var(--rose)", anim: false },
    idle:    { color: "var(--t2)", label: "Firebase", dot: "var(--t2)", anim: false },
  }[syncStatus] || {};

  return (
    <>
      <style>{CSS}</style>
      {showNewNote && <NewNoteModal tree={tree} defaultFolderId={newNoteFolder} onClose={() => { setShowNewNote(false); setNewNoteFolder(null); }} onCreate={createNote} />}
      {showNewFolder && <NewFolderModal tree={tree} defaultFolderId={newNoteFolder} onClose={() => { setShowNewFolder(false); setNewNoteFolder(null); }} onCreate={createFolder} />}
      {dialog?.type === "confirm" && <ConfirmModal title={dialog.title} message={dialog.message} confirmLabel={dialog.confirmLabel} onConfirm={dialog.onConfirm} onCancel={dialog.onCancel} />}
      {dialog?.type === "rename" && <RenameModal current={dialog.current} type={dialog.itemType} onConfirm={dialog.onConfirm} onCancel={dialog.onCancel} />}
      {toast && <Toast msg={toast.msg} icon={toast.icon} />}
      {ghost && <DragGhost label={ghost.label} x={ghost.x} y={ghost.y} />}

      <div className={`app${mobileNoteFocus && openNote ? " note-focus" : ""}`}>
        {/* Sidebar */}
        <div className={`sidebar${sideCollapsed ? " collapsed" : ""}`}>
          <div className="slogo">
            <div className="slogo-mark"><Icon d={ic.brain} size={16} stroke="#fff" /></div>
            <div className="slogo-text">Know<span>ledge</span> OS</div>
          </div>
          <div className="owner-email" title={OWNER_EMAIL}>{OWNER_EMAIL}</div>
          <div className="snav">
            {navItems.map(item => (
              <div key={item.id} className={`nav-item${activeNav === item.id ? " active" : ""}`}
                onClick={() => { setActiveNav(item.id); setMobileNoteFocus(false); if (item.id !== "knowledge") setOpenNote(null); }}>
                <span style={{ flexShrink: 0 }}><Icon d={item.icon} size={16} /></span>
                <span className="nav-label">{item.label}</span>
              </div>
            ))}
          </div>
          <div className="sfooter">
            <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "5px 8px 5px 10px", borderRadius: 6, background: "var(--glass)", margin: "0 4px 4px" }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: syncInfo.dot, flexShrink: 0, animation: syncInfo.anim ? "pulse 1s infinite" : "none" }} />
              <span className="nav-label" style={{ fontSize: 11, color: syncInfo.color, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>
                {syncInfo.label}
              </span>
              {/* Manual sync button */}
              <button onClick={() => pullFromDrive(false)} title="Pull latest from Firebase"
                style={{ background: "none", border: "none", cursor: "pointer", color: "var(--t2)", padding: "1px 3px", borderRadius: 4, display: "flex", flexShrink: 0 }}
                className="nav-label">
                <Icon d={ic.refresh} size={12} />
              </button>
            </div>
            <button className="new-note-btn" onClick={() => setShowNewNote(true)}>
              <Icon d={ic.plus} size={15} />
              <span className="nav-label">New Note</span>
            </button>
            <button className="stoggle" onClick={toggleTheme} title={theme === "light" ? "Switch to dark mode" : "Switch to light mode"}>
              <Icon d={theme === "light" ? ic.moon : ic.sun} size={15} />
              <span className="nav-label" style={{ fontSize: 12, marginLeft: 8 }}>{theme === "light" ? "Dark mode" : "Light mode"}</span>
            </button>
            <button className="stoggle" onClick={() => setSideCollapsed(c => !c)}>
              <Icon d={sideCollapsed ? ic.chevronRight : ic.menu} size={15} />
            </button>
          </div>
        </div>

        {/* Explorer */}
        <div className={`explorer${showExplorer ? "" : " hidden"}`}>
          <div className="exp-header">
            <div className="exp-title">Explorer</div>
            <div className="exp-actions">
              <button className="ibtn" onClick={() => setShowNewNote(true)} title="New note"><Icon d={ic.plus} size={15} /></button>
              <button className="ibtn" onClick={() => setShowNewFolder(true)} title="New folder"><Icon d={ic.folderPlus} size={15} /></button>
            </div>
          </div>
          {/* Tag filter bar */}
          {(() => {
            const allTags = [...new Set(Object.values(notes || {}).flatMap(n => n.tags || []))].sort();
            if (!allTags.length) return null;
            return (
              <div className="tag-filter-bar">
                <div className="tag-filter-scroll">
                  <button className={`tag-chip${!activeTag ? " active" : ""}`} onClick={() => setActiveTag(null)}>All</button>
                  {allTags.map(t => (
                    <button key={t} className={`tag-chip${activeTag === t ? " active" : ""}`} onClick={() => setActiveTag(at => at === t ? null : t)}>{t}</button>
                  ))}
                </div>
              </div>
            );
          })()}
          <div className="tree-wrap">
            {activeTag ? (
              // Tag-filtered flat list of notes
              (() => {
                const tagged = Object.entries(notes || {})
                  .filter(([_, n]) => (n.tags || []).includes(activeTag) && !n.archived)
                  .sort((a, b) => (b[1].updated || "").localeCompare(a[1].updated || ""));
                return tagged.length === 0 ? (
                  <div style={{ padding: "18px 10px", fontSize: 12, color: "var(--t2)", textAlign: "center" }}>No notes tagged "{activeTag}"</div>
                ) : tagged.map(([id, note]) => (
                  <div key={id}
                    className={`tree-row${selId === id ? " sel" : ""}`}
                    onClick={() => { setSelId(id); setFolderView(null); setOpenNote(id); setActiveNav("knowledge"); setMobileNoteFocus(true); }}>
                    <Icon d={ic.file} size={13} stroke="var(--teal)" style={{ flexShrink: 0 }} />
                    <span className="tree-lbl">{note.title || "Untitled"}</span>
                    {note.pinned && <Icon d={ic.pin} size={10} fill="var(--rose)" stroke="var(--rose)" />}
                  </div>
                ));
              })()
            ) : (
              tree.map(node => (
                <TreeNode key={node.id} node={node} depth={0} selId={selId}
                  onSelect={n => {
                    if (n._pin) { updateNote(n.id, { pinned: !notes[n.id]?.pinned }); showToast(notes[n.id]?.pinned ? "Unpinned" : "Pinned", ic.pin); return; }
                    setSelId(n.id); setFolderView(null);
                    if (notes[n.id]) { setOpenNote(n.id); setActiveNav("knowledge"); setMobileNoteFocus(true); }
                  }}
                  onToggle={id => setTree(t => toggleExpand(t, id))}
                  onRename={renameItem}
                  onDelete={handleTreeDelete}
                  onNewNote={handleTreeNewNote}
                  onNewFolder={handleTreeNewFolder}
                  onMove={handleMove}
                  onFolderClick={handleFolderClick}
                  dropTargetId={dropTargetId} />
              ))
            )}
          </div>
        </div>

        {/* Main */}
        <div className="main">{renderMain()}</div>

        {/* Right Panel */}
        {activeNav === "knowledge" && (
          <div className={`rpanel${rightOpen ? "" : " hidden"}`}>
            {openNote && notes[openNote] ? (
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", borderBottom: "1px solid var(--border)" }}>
                <span style={{ fontSize: 11, fontWeight: 600, textTransform: "uppercase", letterSpacing: 1, color: "var(--t2)" }}>Properties</span>
                <button className="ibtn" onClick={() => setRightOpen(false)}><Icon d={ic.close} size={14} /></button>
              </div>
            ) : null}
            <RightPanel note={openNote ? notes[openNote] : null} noteId={openNote} tree={tree} onOpenNote={openNote_} />
          </div>
        )}
        {activeNav === "knowledge" && !rightOpen && (
          <button className="ibtn" style={{ position: "absolute", right: 8, top: 54, background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 6, padding: 6 }}
            onClick={() => setRightOpen(true)} title="Show properties">
            <Icon d={ic.eye} size={14} />
          </button>
        )}
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
