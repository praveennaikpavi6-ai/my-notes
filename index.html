const firebaseFileStore = (() => {
  try {
    const storage = firebase.storage(firebaseApp);
    return {
      async upload(noteId, file) {
        const safeName = file.name.replace(/[^\w.\-() ]+/g, "_");
        const path = `attachments/${noteId}/${Date.now()}-${safeName}`;
        const ref = storage.ref(path);
        const snap = await ref.put(file, { contentType: file.type || "application/octet-stream" });

        return { id: path, name: file.name, type: file.type || "file", size: file.size, url, path, uploadedAt: new Date().toISOString() };

      async remove(path) {
        if (!path) return;
        await storage.ref(path).delete();
      }
    };
  } catch (e) {
    console.warn("Firebase Storage init failed:", e);
    return {
      async upload() { throw new Error("Firebase Storage is not available"); },
      async remove() {}
    };
  }
})();

const firestoreStore = (() => {
  try {
    const db = firebase.firestore(firebaseApp);
    db.settings({ ignoreUndefinedProperties: true });
    const stateRef = db.collection("knowledgeOS").doc("state");
    const withTimeout = (promise, ms = 6000) => Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error("Firestore request timed out")), ms))
    ]);
    const stripUndefined = (value) => {
      if (Array.isArray(value)) return value.map(stripUndefined);
      if (value && typeof value === "object") {
        return Object.fromEntries(
          Object.entries(value)
            .filter(([, v]) => v !== undefined)
            .map(([k, v]) => [k, stripUndefined(v)])
        );
      }
      return value;
    };
    return {
      async load() {
        const snap = await withTimeout(stateRef.get());
        const data = snap.exists ? snap.data() : null;
        return data?.tree && data?.notes ? { tree: data.tree, notes: data.notes } : null;
      },
      async save(data) {
        const cleanData = stripUndefined(data);
        await stateRef.set({
          tree: cleanData.tree,
          notes: cleanData.notes,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });
        return true;
      }
    };
  } catch (e) {
    console.warn("Firestore init failed:", e);
    return {
      async load() { return null; },
      async save() { return false; }
    };
  }
})();

// ── Tree utilities ────────────────────────────────────────────────────────────
const flattenTree = (nodes, path = []) => {
  const r = [];
  for (const n of nodes) {
    r.push({ ...n, path });
    if (n.children) r.push(...flattenTree(n.children, [...path, n.label]));
  }
  return r;
};
const findNode = (nodes, id) => { for (const n of nodes) { if (n.id === id) return n; if (n.children) { const f = findNode(n.children, id); if (f) return f; } } return null; };
const toggleExpand = (nodes, id) => nodes.map(n => { if (n.id === id) return { ...n, expanded: !n.expanded }; if (n.children) return { ...n, children: toggleExpand(n.children, id) }; return n; });
const addToFolder = (nodes, fid, item) => nodes.map(n => { if (n.id === fid) return { ...n, expanded: true, children: [...(n.children || []), item] }; if (n.children) return { ...n, children: addToFolder(n.children, fid, item) }; return n; });
const removeFromTree = (nodes, id) => nodes
  .filter(n => n.id !== id)
  .map(n => n.children ? { ...n, children: removeFromTree(n.children, id) } : n);
const updateTreeLabel = (nodes, id, label) => nodes.map(n => { if (n.id === id) return { ...n, label }; if (n.children) return { ...n, children: updateTreeLabel(n.children, id, label) }; return n; });

// Extract a node and return [extracted node, remaining tree]
// Remove a node by id from anywhere in the tree, return [extracted, newTree]
const extractNode = (nodes, id) => {
  let extracted = null;
  const remaining = nodes.reduce((acc, n) => {
    if (n.id === id) { extracted = n; return acc; } // skip = extract
    if (n.children) {
      const [ex, kids] = extractNode(n.children, id);
      if (ex) extracted = ex;
      acc.push({ ...n, children: kids });
    } else {
      acc.push(n);
    }
    return acc;
  }, []);
  return [extracted, remaining];
};

// Move dragId node into targetFolderId folder
const moveNode = (nodes, dragId, targetFolderId) => {
  const [node, trimmed] = extractNode(nodes, dragId);
  if (!node) return nodes;
  if (!targetFolderId) return [...trimmed, node];
  // Insert into target folder
  const insertInto = (ns) => ns.map(n => {
    if (n.id === targetFolderId) {
      return { ...n, expanded: true, children: [...(n.children || []), node] };
    }
    if (n.children) return { ...n, children: insertInto(n.children) };
    return n;
  });
  return insertInto(trimmed);
};

// ── Smart KOS Key generator ──────────────────────────────────────────────────
const generateKosKey = (title, tree, folderId) => {
  // Get folder abbreviation from path
  const flat = flattenTree(tree);
  const folder = flat.find(n => n.id === folderId);
  const path = folder ? [...(folder.path || []), folder.label] : [];
  
  // Build prefix from folder path (take first letters)
  const prefixParts = path.map(p => {
    const words = p.replace(/[^a-zA-Z0-9 ]/g, "").trim().split(/\s+/);
    return words.map(w => w[0]?.toUpperCase() || "").join("").slice(0, 3);
  });
  const prefix = prefixParts.slice(-2).join("-") || "KOS"; // last 2 folders
  
  // Build suffix from note title (first letters of words, max 3 chars)
  const titleWords = title.replace(/[^a-zA-Z0-9 ]/g, "").trim().split(/\s+/);
  const titleCode = titleWords.map(w => w[0]?.toUpperCase() || "").join("").slice(0, 4);
  
  // Add 3-digit counter based on timestamp
  const counter = String(Date.now() % 1000).padStart(3, "0");
  
  return "#" + prefix + "-" + titleCode + counter;
};

// ── Markdown renderer ─────────────────────────────────────────────────────────
function renderMD(md) {
  if (!md) return "";
  let h = md
    .replace(/```(\w*)\n([\s\S]*?)```/gm, (_, lang, code) => `<pre><code class="lang-${lang}">${code.trim().replace(/</g,'&lt;')}</code></pre>`)
    .replace(/^### (.+)$/gm, "<h3>$1</h3>")
    .replace(/^## (.+)$/gm, "<h2>$1</h2>")
    .replace(/^# (.+)$/gm, "<h1>$1</h1>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/^\> (.+)$/gm, "<blockquote>$1</blockquote>")
    .replace(/^- \[([ xX])\] (.+)$/gm, (_, mark, txt) => {
      const done = mark.toLowerCase() === "x";
      return `<li class="task${done ? " done" : ""}"><span class="task-check" role="checkbox" aria-checked="${done}"></span><span class="task-txt">${txt}</span></li>`;
    })
    .replace(/^\- (.+)$/gm, "<li>$1</li>")
    .replace(/^(\d+)\. (.+)$/gm, "<li>$2</li>")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  h = h.replace(/(\|.+\|\n)+/g, table => {
    const rows = table.trim().split("\n").filter(r => !r.match(/^\|[-|: ]+\|$/));
    const pr = (row, tag) => "<tr>" + row.split("|").filter((_, i, a) => i > 0 && i < a.length - 1).map(c => `<${tag}>${c.trim()}</${tag}>`).join("") + "</tr>";
    return `<table>${pr(rows[0], "th")}${rows.slice(1).map(r => pr(r, "td")).join("")}</table>`;
  });
  h = h.split("\n\n").map(p => {
    if (p.match(/^<(h[123]|pre|table|blockquote|ul|ol|li)/) || !p.trim()) return p;
    return `<p>${p.trim()}</p>`;
  }).join("\n");
  h = h.replace(/(<li>[\s\S]*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  return h;
}

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  --r: 12px; --rsm: 8px; --font: 'Inter',system-ui,sans-serif; --mono: 'JetBrains Mono',monospace;
  --tr: 0.18s cubic-bezier(0.4,0,0.2,1);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.4); --shadow-md: 0 8px 32px rgba(0,0,0,0.5);
}
/* ── Light theme ─────────────────────────────────────────────────────────────── */
:root[data-theme="light"] {
  --bg0: #f4f4f7; --bg1: #ffffff; --bg2: #ffffff; --bg3: #f0f0f4; --bg4: #e4e4ec;
  --border: rgba(0,0,0,0.08); --border-hi: rgba(0,0,0,0.14);
  --t0: #16161a; --t1: #3c3c46; --t2: #86868f;
  --accent: #6a55f0; --accent2: #5b45e6; --glow: rgba(106,85,240,0.18);
  --teal: #0891b2; --rose: #e11d48; --amber: #d97706; --emerald: #059669; --orange: #ea580c;
  --glass: rgba(0,0,0,0.03); --glass-hi: rgba(0,0,0,0.06);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06); --shadow-md: 0 12px 32px rgba(0,0,0,0.12);
}
html, body { background: var(--bg0); }
body { font-family: var(--font); background: var(--bg0); color: var(--t0); height: 100vh; overflow: hidden; transition: background var(--tr), color var(--tr); }

::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 99px; }

.sidebar.collapsed { width: 56px; min-width: 56px; }
.explorer { width: 260px; min-width: 260px; height: 100vh; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: width var(--tr), min-width var(--tr); }

/* Toolbar */
.toolbar { display: flex; align-items: center; gap: 4px; padding: 8px 14px; border-bottom: 1px solid var(--border); background: var(--bg1); flex-shrink: 0; flex-wrap: wrap; min-height: 44px; }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 36px 48px; }

// ── Context Menu ──────────────────────────────────────────────────────────────
// ── ConfirmModal (replaces confirm() — blocked in iframes) ────────────────────
function ConfirmModal({ title, message, confirmLabel = "Delete", danger = true, onConfirm, onCancel }) {
  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal" style={{ width: 360 }}>
        <div className="modal-title">{title}</div>
        <div style={{ fontSize: 14, color: "var(--t1)", marginBottom: 22, lineHeight: 1.6 }}>{message}</div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className={`btn ${danger ? "btn-danger" : "btn-primary"}`} onClick={onConfirm}>{confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

// ── RenameModal (replaces prompt() — blocked in iframes) ──────────────────────
function RenameModal({ current, type, onConfirm, onCancel }) {
  const [val, setVal] = useState(current);
  const submit = () => { if (val.trim() && val.trim() !== current) onConfirm(val.trim()); else onCancel(); };
  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal" style={{ width: 360 }}>
        <div className="modal-title">Rename {type}</div>
        <div className="modal-label">New name</div>
        <input className="modal-input" autoFocus value={val} onChange={e => setVal(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") submit(); if (e.key === "Escape") onCancel(); }} />
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
          <button className="btn btn-primary" onClick={submit} disabled={!val.trim() || val.trim() === current}>Rename</button>
        </div>
      </div>
    </div>
  );
}

function ContextMenu({ x, y, items, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    setTimeout(() => document.addEventListener("mousedown", h), 0);
    return () => document.removeEventListener("mousedown", h);
  }, []);
  // Keep menu inside viewport
  const left = Math.min(x, window.innerWidth - 180);
  const top = Math.min(y, window.innerHeight - items.length * 36 - 20);
  return (
    <div ref={ref} className="ctx-menu" style={{ left, top }}>
      {items.map((item, i) =>
        item === "sep" ? <div key={i} className="ctx-sep" /> :
        <div key={i} className={`ctx-item${item.danger ? " danger" : ""}`} onClick={() => { item.action(); onClose(); }}>
          <Icon d={item.icon} size={14} />{item.label}
        </div>
      )}
    </div>
  );
}

// ── Drag ghost overlay ───────���────────────────────────────────────────────────
// Uses mouse events instead of HTML5 drag API (which is blocked in iframes)
const dragState = { id: null, label: null };

function DragGhost({ label, x, y }) {
  if (!label) return null;
  return (
    <div data-drag-ghost style={{
      position: "fixed", left: x + 14, top: y - 12, zIndex: 99999,
      background: "var(--bg3)", border: "1px solid var(--accent)",
      borderRadius: 6, padding: "4px 10px", fontSize: 12, color: "var(--accent2)",
      pointerEvents: "none", userSelect: "none", whiteSpace: "nowrap",
      display: "flex", alignItems: "center", gap: 6,
    }}>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/></svg>
      {label}
    </div>
  );
}

// ── TreeNode ──────────────────────────────────────────────────────────────────
function TreeNode({ node, depth, selId, onSelect, onToggle, onRename, onDelete, onNewNote, onNewFolder, onMove, onFolderClick, dropTargetId }) {
  const isF = node.type === "folder";
  const hasC = node.children && node.children.length > 0;
  const [ctx, setCtx] = useState(null);
  const rowRef = useRef(null);

  const isDragTarget = dropTargetId === node.id && isF;

  const handleCtx = e => {
    e.preventDefault(); e.stopPropagation();
    const items = isF ? [
      { icon: ic.plus, label: "New note here", action: () => onNewNote(node.id) },
      { icon: ic.folderPlus, label: "New subfolder", action: () => onNewFolder(node.id) },
      "sep",
      { icon: ic.edit, label: "Rename", action: () => onRename(node.id, node.label, "folder") },
      "sep",
      { icon: ic.trash, label: "Delete folder", danger: true, action: () => onDelete(node.id, "folder", node.label) },
    ] : [
      { icon: ic.eye, label: "Open note", action: () => onSelect(node) },
      { icon: ic.edit, label: "Rename", action: () => onRename(node.id, node.label, "note") },
      "sep",
      { icon: ic.pin, label: "Pin / Unpin", action: () => onSelect({ ...node, _pin: true }) },
      "sep",
      { icon: ic.trash, label: "Delete note", danger: true, action: () => onDelete(node.id, "note", node.label) },
    ];
    setCtx({ x: e.clientX, y: e.clientY, items });
  };

  const handleMouseDown = e => {
    if (e.button !== 0) return;
    if (e.target.closest(".ctx-menu")) return;
    e.preventDefault();
    dragState.id = node.id;
    dragState.label = node.label;
    window.__mouseDragStart = { x: e.clientX, y: e.clientY };
    window.__mouseDragging = false;
  };

  const handleClick = e => {
    if (window.__mouseDragging) return; // was a drag, not a click
    if (isF) { onToggle(node.id); onFolderClick(node); }
    else { onSelect(node); }
  };

  return (
    <div data-nodeid={node.id} data-nodetype={node.type}>
      {ctx && <ContextMenu x={ctx.x} y={ctx.y} items={ctx.items} onClose={() => setCtx(null)} />}
      <div
        ref={rowRef}
        className={`tree-row${selId === node.id ? " sel" : ""}${isDragTarget ? " drag-over" : ""}`}
        style={{ paddingLeft: 8 + depth * 14 }}
        onClick={handleClick}
        onContextMenu={handleCtx}
      >
        <span className="drag-handle" onMouseDown={handleMouseDown} title="Drag to move">
          <svg width="10" height="14" viewBox="0 0 10 14" fill="var(--t2)">
            <circle cx="3" cy="3" r="1.2"/><circle cx="7" cy="3" r="1.2"/>
            <circle cx="3" cy="7" r="1.2"/><circle cx="7" cy="7" r="1.2"/>
            <circle cx="3" cy="11" r="1.2"/><circle cx="7" cy="11" r="1.2"/>
          </svg>
        </span>
        {isF ? (
          <span className={`tree-chevron${node.expanded ? " open" : ""}`} style={{ width: 14, display: "flex", alignItems: "center" }}>
            {hasC ? <Icon d={ic.chevronRight} size={12} /> : <span style={{ width: 12 }} />}
          </span>
        ) : <span style={{ width: 14 }} />}
        <span className={isF ? "folder-ic" : "file-ic"}>
          <Icon d={isF ? (node.expanded ? ic.folderOpen : ic.folder) : ic.file} size={14} />
        </span>
        <span className="tree-lbl">{node.label}</span>
        {node.pinned && <span className="tree-pin"><Icon d={ic.pin} size={10} fill="var(--rose)" stroke="var(--rose)" /></span>}
      </div>
      {isF && node.expanded && node.children && (
        <div className="tree-children">
          {[...node.children].sort((a,b)=>{
            if(a.type===b.type)return 0;
            return a.type==="folder"?1:-1;
          }).map(c => (
            <TreeNode key={c.id} node={c} depth={depth + 1} selId={selId}
              onSelect={onSelect} onToggle={onToggle}
              onRename={onRename} onDelete={onDelete}
              onNewNote={onNewNote} onNewFolder={onNewFolder}
              onMove={onMove} onFolderClick={onFolderClick}
              dropTargetId={dropTargetId} />
          ))}
        </div>
      )}
    </div>
  );
}

// ── KnowledgeGraph ────────────────────────────────────────────────────────────
function KnowledgeGraph({ tree, notes, onFolderClick }) {
  const [hovered, setHovered] = useState(null);
  const [dims, setDims] = useState({ W: 700, H: 280 });
  const wrapRef = useRef(null);
  const animRef = useRef(null);
  const [tick, setTick] = useState(0);

  useEffect(() => {
    const ro = new ResizeObserver(entries => {
      const w = entries[0].contentRect.width;
      setDims({ W: w || 700, H: Math.min(300, Math.max(220, w * 0.35)) });
    });
    if (wrapRef.current) ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  useEffect(() => {
    let frame, start;
    const loop = (ts) => {
      if (!start) start = ts;
      setTick(ts - start);
      frame = requestAnimationFrame(loop);
    };
    frame = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(frame);
  }, []);

  const COLORS = ["#a78bfa","#22d3ee","#fbbf24","#34d399","#f472b6","#f97316","#60a5fa","#e879f9","#a3e635","#fb7185"];

  // Build nodes: top-level folders = inner ring, sub-folders = outer ring
  const topFolders = tree.filter(n => n.type === "folder");
  const allFlat = flattenTree(tree);

  const getNoteCount = (folderId) => {
    const node = findNode(tree, folderId);
    if (!node) return 0;
    return flattenTree([node]).filter(n => n.type === "note").length;
  };

  const { W, H } = dims;
  const cx = W / 2, cy = H / 2;
  const innerR = Math.min(W, H) * 0.28;
  const outerR = Math.min(W, H) * 0.44;

  // Center hub
  const hubNode = { id: "__hub__", label: "Knowledge\nOS", x: cx, y: cy, r: 22, color: "#7c6af7", isHub: true };

  // Top-level folder nodes (inner ring)
  const innerNodes = topFolders.slice(0, 8).map((f, i) => {
    const angle = (2 * Math.PI * i / Math.max(topFolders.length, 1)) - Math.PI / 2;
    return {
      id: f.id, label: f.label, x: cx + innerR * Math.cos(angle), y: cy + innerR * Math.sin(angle),
      r: 14, color: COLORS[i % COLORS.length], noteCount: getNoteCount(f.id),
      children: f.children?.filter(c => c.type === "folder") || [], isHub: false, angle
    };
  });

  // Sub-folder nodes (outer ring) — only for hovered top-level
  const outerNodes = [];
  if (hovered && hovered !== "__hub__") {
    const parent = innerNodes.find(n => n.id === hovered);
    if (parent) {
      parent.children.slice(0, 6).forEach((sf, i) => {
        const spreadAngle = parent.angle + (i - (parent.children.length - 1) / 2) * 0.45;
        outerNodes.push({
          id: sf.id, label: sf.label, x: cx + outerR * Math.cos(spreadAngle), y: cy + outerR * Math.sin(spreadAngle),
          r: 10, color: parent.color + "cc", noteCount: getNoteCount(sf.id), parentId: hovered, isHub: false
        });
      });
    }
  }

  const allNodes = [hubNode, ...innerNodes, ...outerNodes];

  // Edges
  const edges = [
    ...innerNodes.map(n => ({ from: hubNode, to: n })),
    ...outerNodes.map(n => ({ from: innerNodes.find(p => p.id === n.parentId), to: n })),
  ].filter(e => e.from && e.to);

  const dashOffset = -(tick / 40) % 16;

  return (
    <div ref={wrapRef} style={{ width: "100%", cursor: "default" }}>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: "block", userSelect: "none" }}>
        <defs>
          <radialGradient id="hubGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#a78bfa" stopOpacity="0.9"/>
            <stop offset="100%" stopColor="#22d3ee" stopOpacity="0.7"/>
          </radialGradient>
        </defs>

        {/* Edges */}
        {edges.map((e, i) => (
          <line key={i}
            x1={e.from.x} y1={e.from.y} x2={e.to.x} y2={e.to.y}
            stroke={hovered === e.to.id ? e.to.color || "#7c6af7" : "rgba(124,106,247,0.25)"}
            strokeWidth={hovered === e.to.id ? 1.5 : 1}
            strokeDasharray="5,5"
            strokeDashoffset={dashOffset}
            style={{ transition: "stroke 0.2s" }}
          />
        ))}

        {/* Outer (sub-folder) nodes */}
        {outerNodes.map(n => (
          <g key={n.id} style={{ cursor: "pointer" }}
            onClick={() => onFolderClick && onFolderClick({ id: n.id, label: n.label })}
            onMouseEnter={() => setHovered(n.id)} onMouseLeave={() => setHovered(hovered === n.id ? n.parentId : hovered)}>
            <circle cx={n.x} cy={n.y} r={n.r + 4} fill={n.color} opacity="0.08"/>
            <circle cx={n.x} cy={n.y} r={n.r} fill={n.color + "22"} stroke={n.color} strokeWidth="1.5"/>
            <text x={n.x} y={n.y + n.r + 13} textAnchor="middle" fill="var(--t1)" fontSize="10" fontFamily="Inter">
              {n.label.length > 13 ? n.label.slice(0, 12) + "…" : n.label}
            </text>
            {n.noteCount > 0 && (
              <text x={n.x} y={n.y + 4} textAnchor="middle" fill={n.color} fontSize="9" fontWeight="700">{n.noteCount}</text>
            )}
          </g>
        ))}

        {/* Inner (top-level folder) nodes */}
        {innerNodes.map(n => {
          const isHov = hovered === n.id;
          return (
            <g key={n.id} style={{ cursor: "pointer" }}
              onClick={() => onFolderClick && onFolderClick({ id: n.id, label: n.label })}
              onMouseEnter={() => setHovered(n.id)} onMouseLeave={() => setHovered(null)}>
              {/* Pulse ring on hover */}
              {isHov && <circle cx={n.x} cy={n.y} r={n.r + 10} fill={n.color} opacity="0.12"/>}
              <circle cx={n.x} cy={n.y} r={n.r + 4} fill={n.color} opacity={isHov ? 0.15 : 0.06} style={{transition:"opacity 0.2s"}}/>
              <circle cx={n.x} cy={n.y} r={n.r} fill={n.color + "30"} stroke={n.color} strokeWidth={isHov ? 2.5 : 1.8} style={{transition:"stroke-width 0.2s"}}/>
              {/* Note count inside circle */}
              <text x={n.x} y={n.y + 4} textAnchor="middle" fill={isHov ? n.color : "var(--t0)"} fontSize={n.noteCount > 9 ? "9" : "11"} fontWeight="700" fontFamily="Inter">
                {n.noteCount || ""}
              </text>
              {/* Label below */}
              <text x={n.x} y={n.y + n.r + 14} textAnchor="middle" fill={isHov ? "var(--t0)" : "var(--t1)"} fontSize="11" fontWeight={isHov ? "600" : "400"} fontFamily="Inter" style={{transition:"fill 0.2s"}}>
                {n.label.length > 16 ? n.label.slice(0, 15) + "…" : n.label}
              </text>
              {/* Sub-folder count hint */}
              {n.children.length > 0 && (
                <text x={n.x} y={n.y + n.r + 26} textAnchor="middle" fill={n.color} fontSize="9" fontFamily="Inter" opacity="0.7">
                  {n.children.length} sub-folder{n.children.length > 1 ? "s" : ""}
                </text>
              )}
              {/* Click hint on hover */}
              {isHov && (
                <text x={n.x} y={n.y + n.r + (n.children.length > 0 ? 38 : 26)} textAnchor="middle" fill="var(--t2)" fontSize="9" fontFamily="Inter">
                  click to open
                </text>
              )}
            </g>
          );
        })}

        {/* Hub node */}
        <g style={{ cursor: "default" }}
          onMouseEnter={() => setHovered("__hub__")} onMouseLeave={() => setHovered(null)}>
          <circle cx={cx} cy={cy} r={hubNode.r + 8} fill="url(#hubGrad)" opacity="0.12"/>
          <circle cx={cx} cy={cy} r={hubNode.r} fill="rgba(124,106,247,0.2)" stroke="#7c6af7" strokeWidth="2"/>
          <text x={cx} y={cy - 3} textAnchor="middle" fill="var(--t0)" fontSize="8" fontWeight="700" fontFamily="Inter">Know</text>
          <text x={cx} y={cy + 7} textAnchor="middle" fill="var(--accent2)" fontSize="8" fontWeight="700" fontFamily="Inter">ledge</text>
        </g>

        {/* Legend */}
        <text x={12} y={H - 8} fill="var(--t2)" fontSize="10" fontFamily="Inter">
          Hover a folder to see sub-folders · Click to open
        </text>
      </svg>
    </div>
  );
}

// ── NewNoteModal ──────────────────────────────────────────────────────────────
function NewNoteModal({ tree, onClose, onCreate, defaultFolderId }) {
  const [title, setTitle] = useState("");
  const folders = flattenTree(tree).filter(n => n.type === "folder");
  const [fid, setFid] = useState(defaultFolderId || folders[0]?.id || "");
  const create = () => {
    if (!title.trim()) return;
    const id = "note_" + Date.now();
    const kosKey = generateKosKey(title.trim(), tree, fid);
    onCreate(id, fid, { title: title.trim(), content: "", tags: [], pinned: false, color: "", archived: false, wordCount: 0, kosKey, created: new Date().toISOString().split("T")[0], updated: new Date().toISOString().split("T")[0] });
    onClose();
  };
  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">New Note</div>
        <div className="modal-label">Title</div>
        <input className="modal-input" autoFocus placeholder="Note title…" value={title} onChange={e => setTitle(e.target.value)} onKeyDown={e => e.key === "Enter" && create()} />
        <div className="modal-label">Folder</div>
        <select className="modal-input" value={fid} onChange={e => setFid(e.target.value)}>

        </div>

  );
}

// ── TableEditorModal ──────────────────────────────────────────────────────────
function TableEditorModal({ data, onSave, onCancel }) {
  const [headers, setHeaders] = useState([...data.headers]);
  const [rows, setRows] = useState(data.rows.map(r => [...r]));
  const [tableWidth, setTableWidth] = useState(data.width || "100%");

  const updateHeader = (i, v) => setHeaders(h => h.map((x, j) => j === i ? v : x));
  const updateCell = (ri, ci, v) => setRows(rs => rs.map((row, r) => r === ri ? row.map((c, j) => j === ci ? v : c) : row));
  const addRow = () => setRows(rs => [...rs, Array(headers.length).fill("")]);
  const removeRow = (i) => setRows(rs => rs.filter((_, j) => j !== i));
  const addCol = () => { setHeaders(h => [...h, `Header ${h.length + 1}`]); setRows(rs => rs.map(r => [...r, ""])); };
  const removeCol = (i) => { setHeaders(h => h.filter((_, j) => j !== i)); setRows(rs => rs.map(r => r.filter((_, j) => j !== i))); };

  const handleSave = () => {
    const w = tableWidth === "auto" ? "" : `width:${tableWidth};`;
    const th = `padding:8px 12px;background:#252840;color:#f0f2ff;border:1px solid #3d4060;text-align:left`;
    const td = `padding:8px 12px;border:1px solid #3d4060`;
    const ths = headers.map(h => `<th style="${th}">${h || "&nbsp;"}</th>`).join("");
    const trs = rows.map(row => `<tr>${row.map(c => `<td style="${td}">${c || "&nbsp;"}</td>`).join("")}</tr>`).join("\n  ");
    const html = `<table style="${w}border-collapse:collapse">\n<thead><tr>${ths}</tr></thead>\n<tbody>\n  ${trs}\n</tbody>\n</table>`;
    onSave(html);
  };

  const cellRefs = useRef({});
  const focusCell = (ri, ci) => {
    const key = `${ri}-${ci}`;
    setTimeout(() => cellRefs.current[key]?.focus(), 0);
  };

  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onCancel()}>
      <div className="modal" style={{ width:"min(94vw,900px)", maxHeight:"90vh", display:"flex", flexDirection:"column", padding:0, overflow:"hidden", borderRadius:14 }}>

        {/* Header bar */}
        <div style={{ padding:"14px 18px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", gap:10, flexShrink:0, background:"var(--bg1)" }}>
          <span style={{ fontSize:15, fontWeight:700, color:"var(--t0)", flex:1 }}>✏️ Edit Table</span>
          <span style={{ fontSize:11, color:"var(--t2)", marginRight:4 }}>Width:</span>
          {["25%","50%","75%","100%","auto"].map(w => (
            <button key={w} onClick={() => setTableWidth(w)} className="fmt-btn"
              style={{ padding:"3px 9px", border:`1px solid ${tableWidth===w?"var(--accent)":"var(--border)"}`, color: tableWidth===w?"var(--accent2)":"var(--t2)", background: tableWidth===w?"rgba(124,106,247,0.1)":"none", borderRadius:6 }}>
              {w}
            </button>
          ))}
          <div style={{ width:1, height:18, background:"var(--border)", margin:"0 6px" }}/>
          <button className="ibtn" onClick={onCancel} title="Close"><Icon d={ic.close} size={15}/></button>
        </div>

        {/* Toolbar */}
        <div style={{ padding:"10px 18px", borderBottom:"1px solid var(--border)", display:"flex", alignItems:"center", gap:8, flexShrink:0, flexWrap:"wrap" }}>
          <button className="btn btn-ghost" style={{ fontSize:12, padding:"5px 12px" }} onClick={addRow}>
            <Icon d={ic.plus} size={12}/> Add Row
          </button>
          <button className="btn btn-ghost" style={{ fontSize:12, padding:"5px 12px" }} onClick={addCol}>
            <Icon d={ic.plus} size={12}/> Add Column
          </button>
          <span style={{ fontSize:11, color:"var(--t2)", marginLeft:6 }}>
            {headers.length} col{headers.length!==1?"s":""} × {rows.length} row{rows.length!==1?"s":""}
          </span>
          <span style={{ fontSize:11, color:"var(--t2)", marginLeft:4 }}>· Click any cell to edit · Tab to move right · Enter to add row</span>
        </div>

        {/* Table grid */}
        <div style={{ flex:1, overflow:"auto", padding:18 }}>
          <div style={{ overflowX:"auto" }}>
            <table style={{ borderCollapse:"collapse", width:"100%", minWidth: headers.length * 130 }}>
              <thead>
                <tr>
                  <th style={{ width:28, background:"var(--bg3)", border:"1px solid var(--border)" }}/>
                  {headers.map((h, ci) => (
                    <th key={ci} style={{ padding:4, background:"var(--bg3)", border:"1px solid var(--border)", position:"relative", minWidth:120 }}>
                      <input className="tbl-editor-head" value={h}
                        placeholder={`Header ${ci+1}`}
                        onChange={e => updateHeader(ci, e.target.value)}
                        onKeyDown={e => { if(e.key==="Tab"){e.preventDefault(); ci<headers.length-1?focusCell("h",ci+1):focusCell(0,0);} }}
                        ref={el => { cellRefs.current[`h-${ci}`] = el; }}
                      />
                      {headers.length > 1 && (
                        <button onClick={() => removeCol(ci)} title="Remove column"
                          style={{ position:"absolute", top:2, right:2, width:16, height:16, background:"rgba(244,114,182,0.2)", border:"none", borderRadius:3, color:"var(--rose)", cursor:"pointer", fontSize:11, lineHeight:"16px", textAlign:"center", padding:0 }}>×</button>
                      )}
                    </th>
                  ))}
                  <th style={{ width:28, background:"var(--bg3)", border:"1px solid var(--border)" }}/>
                </tr>
              </thead>
              <tbody>
                {rows.map((row, ri) => (
                  <tr key={ri} style={{ background: ri%2===0?"transparent":"rgba(255,255,255,0.02)" }}>
                    <td style={{ padding:"4px 6px", textAlign:"center", fontSize:10, color:"var(--t2)", border:"1px solid var(--border)", background:"var(--bg3)", width:28 }}>{ri+1}</td>
                    {row.map((cell, ci) => (
                      <td key={ci} style={{ padding:4, border:"1px solid var(--border)" }}>
                        <input className="tbl-editor-cell" value={cell}
                          placeholder="—"
                          ref={el => { cellRefs.current[`${ri}-${ci}`] = el; }}
                          onChange={e => updateCell(ri, ci, e.target.value)}
                          onKeyDown={e => {
                            if(e.key==="Tab"){ e.preventDefault(); ci<row.length-1?focusCell(ri,ci+1):ri<rows.length-1?focusCell(ri+1,0):addRow(); }
                            if(e.key==="Enter"){ e.preventDefault(); ri===rows.length-1?addRow():focusCell(ri+1,ci); }
                          }}
                        />
                      </td>
                    ))}
                    <td style={{ padding:"4px 2px", textAlign:"center", border:"1px solid var(--border)" }}>
                      {rows.length > 1 && (
                        <button onClick={() => removeRow(ri)} title="Delete row"
                          style={{ background:"none", border:"none", color:"var(--t2)", cursor:"pointer", fontSize:14, padding:"2px 5px", borderRadius:4, lineHeight:1 }}
                          onMouseEnter={e => e.currentTarget.style.color="var(--rose)"}
                          onMouseLeave={e => e.currentTarget.style.color="var(--t2)"}>✕</button>
                      )}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        {/* Footer */}
        <div style={{ padding:"12px 18px", borderTop:"1px solid var(--border)", display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0, background:"var(--bg1)" }}>
          <span style={{ fontSize:11, color:"var(--t2)" }}>Changes replace the original table in your note</span>
          <div style={{ display:"flex", gap:10 }}>
            <button className="btn btn-ghost" onClick={onCancel}>Cancel</button>
            <button className="btn btn-primary" onClick={handleSave}><Icon d={ic.check} size={13} stroke="#fff"/> Save Table</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── NoteEditor ────────────────────────────────────────────────────────────────
function NoteEditor({ note, noteId, tree, onUpdate, onDelete, onToast, mobileFocus, onToggleMobileFocus }) {
  const [title, setTitle] = useState(note.title || "");
  const [content, setContent] = useState(note.content || "");
  const [tags, setTags] = useState(note.tags || []);
  const [pinned, setPinned] = useState(note.pinned || false);
  const [archived, setArchived] = useState(note.archived || false);
  const [color, setColor] = useState(note.color || "");
  const [preview, setPreview] = useState(true); // ← DEFAULT PREVIEW ON
  const [saved, setSaved] = useState(true);
  const timer = useRef(null);
  const textareaRef = useRef(null);

  // ── Undo / Redo history ────────────────────────────────────────────────────
  // Key insight: push the OLD content (before change) onto undoStack.
  // lastSaved tracks the "committed" snapshot so we know what to push.
  const undoStack = useRef([]);
  const redoStack = useRef([]);
  const histTimer = useRef(null);
  const lastSaved = useRef(note.content || ""); // tracks last committed snapshot
  const [canUndo, setCanUndo] = useState(false);
  const [canRedo, setCanRedo] = useState(false);

  const syncUndoRedo = () => {
    setCanUndo(undoStack.current.length > 0);
    setCanRedo(redoStack.current.length > 0);
  };

  // Called with newVal — debounced so rapid typing = one history entry
  // Pushes the PREVIOUS snapshot (lastSaved) before committing the new value
  const pushHistory = (newVal) => {
    const snapshot = lastSaved.current;         // OLD content before this burst
    clearTimeout(histTimer.current);
    histTimer.current = setTimeout(() => {
      if (snapshot === newVal) return;          // nothing actually changed
      undoStack.current = [...undoStack.current.slice(-99), snapshot];
      redoStack.current = [];                   // new edit clears redo
      lastSaved.current = newVal;               // commit the new value
      syncUndoRedo();
    }, 800);
  };

  // Apply content from undo/redo — does NOT push to history
  const applyHistory = (val) => {
    lastSaved.current = val;                    // update snapshot so next edit pushes correctly
    setContent(val);
    setSaved(false);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => save(title, val, tags, pinned, archived, color), 700);
  };

  const undo = () => {
    if (undoStack.current.length === 0) return;
    clearTimeout(histTimer.current); // cancel any pending history push — it would wipe redoStack
    const prev = undoStack.current[undoStack.current.length - 1];
    undoStack.current = undoStack.current.slice(0, -1);
    redoStack.current = [lastSaved.current, ...redoStack.current.slice(0, 99)];
    applyHistory(prev);
    syncUndoRedo();
    onToast("Undo", ic.undo);
  };

  const redo = () => {
    if (redoStack.current.length === 0) return;
    clearTimeout(histTimer.current); // cancel any pending history push
    const next = redoStack.current[0];

      if (node.nodeType === 3) return node.textContent;
      if (node.nodeType !== 1) return '';
      const tag = node.tagName;
      const inner = Array.from(node.childNodes).map(proc).join('');
      switch(tag) {
        case 'H1': return `# ${inner.trim()}\n\n`;
        case 'H2': return `## ${inner.trim()}\n\n`;
        case 'H3': return `### ${inner.trim()}\n\n`;
        case 'STRONG': case 'B': return `**${inner}**`;
        case 'EM': case 'I': return `*${inner}*`;
        case 'S': case 'STRIKE': return `~~${inner}~~`;

          return `${header}\n${sep}${body ? '\n' + body : ''}\n\n`;
        }
        case 'A': return `[${inner}](${node.getAttribute('href') || ''})`;
        case 'HR': return '---\n\n';
        default: return inner;
      }
    };
    return Array.from(d.childNodes).map(proc).join('').replace(/\n{3,}/g, '\n\n').trim();

:root{--blue:#0A6ED1;--blueDark:#063B6F;--blueLight:#EBF5FC;--teal:#0F8B8D;--green:#107E3E;--amber:#E76500;--purple:#6A2C8E;--border:#D1D9E0;--text:#1C2B39;--muted:#5B738B;--paper:#fff;--bg:#F0F4F8;--mono:'IBM Plex Mono',monospace;--font:'IBM Plex Sans',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.65}.page{max-width:1120px;margin:0 auto;background:var(--paper);min-height:100vh;box-shadow:0 10px 30px rgba(6,59,111,.08)}.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--blueDark),var(--blue) 62%,var(--teal));color:#fff;padding:28px 34px 24px}.hero:before{content:'';position:absolute;right:-70px;top:-80px;width:260px;height:260px;border-radius:50%;background:rgba(255,255,255,.08)}.hero:after{content:'';position:absolute;left:38%;bottom:-48px;width:340px;height:120px;border-radius:50%;background:rgba(255,255,255,.05)}.hero-inner{position:relative;z-index:1}.topline{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:10px;flex-wrap:wrap}.badge{border:1px solid rgba(255,255,255,.34);background:rgba(255,255,255,.16);border-radius:5px;padding:3px 9px;text-transform:uppercase;letter-spacing:.8px;font-size:11px;font-weight:700}.email{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);border-radius:20px;padding:4px 11px}.hero h1{font-size:34px;line-height:1.12;letter-spacing:-.6px;margin:3px 0 8px}.subtitle{font-weight:300;opacity:.82}.meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}.pill{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:4px 11px;font-size:12px;font-weight:500}.body-wrap{padding:30px 34px 38px}.breadcrumb{display:flex;flex-wrap:wrap;gap:8px;align-items:center;color:var(--muted);font-size:12px;margin-bottom:18px}.breadcrumb b{color:#9AAABA;font-weight:500}.breadcrumb strong{color:var(--blueDark)}.doc-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}.doc-head{background:var(--blue);color:#fff;padding:10px 16px;font-weight:700;display:flex;justify-content:space-between;gap:12px;align-items:center}.doc-body{padding:24px 28px}.body h1{font-size:26px;color:var(--blueDark);margin:26px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--blueLight)}.body h2{font-size:21px;color:var(--blue);margin:24px 0 10px}.body h3{font-size:17px;color:var(--teal);margin:20px 0 8px}.body p{margin:0 0 14px}.body strong{color:var(--blueDark);font-weight:700}.body em{color:var(--muted)}.body a{color:var(--blue);font-weight:600}.body ul,.body ol{margin:10px 0 16px 24px}.body li{margin:5px 0}.body blockquote{margin:18px 0;padding:13px 16px;border-left:5px solid var(--amber);background:#FFF6EA;border-radius:0 8px 8px 0;color:#3B2B17}.body code{font-family:var(--mono);font-size:13px;background:#EAF3FC;color:var(--blueDark);border:1px solid #CFE3F5;border-radius:5px;padding:2px 6px}.body pre{margin:18px 0;padding:16px 18px;background:#102A43;color:#D9F2FF;border-radius:10px;overflow:auto}.body pre code{background:transparent;border:0;color:inherit;padding:0}.body table{width:100%;border-collapse:collapse;margin:18px 0;border:1px solid var(--border);font-size:13px}.body th{background:var(--blue);color:#fff;text-align:left;padding:10px 12px;border:1px solid #0B5CAD}.body td{padding:9px 12px;border:1px solid var(--border)}.body tr:nth-child(even) td{background:#F7FAFC}.body img{max-width:100%;height:auto;border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 22px rgba(6,59,111,.10)}.tags{display:flex;gap:6px;flex-wrap:wrap}.tag{display:inline-flex;background:#EEE0F5;color:var(--purple);border:1px solid #D9C1EA;border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700}.tag.muted{background:#F3F5F7;color:var(--muted);border-color:var(--border)}.footer{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;background:var(--blueDark);color:#CFE8FF;padding:16px 34px;font-size:12px}.footer strong{color:#fff}.footer .mail{font-family:var(--mono)}@media(max-width:720px){.hero{padding:22px 18px}.hero h1{font-size:27px}.body-wrap{padding:20px 14px 28px}.doc-body{padding:18px 14px}.doc-head{align-items:flex-start;flex-direction:column}.footer{padding:14px 18px}.body table{display:block;overflow-x:auto;white-space:nowrap}}
@media print{body{background:#fff}.page{box-shadow:none}.hero{print-color-adjust:exact;-webkit-print-color-adjust:exact}.footer{print-color-adjust:exact;-webkit-print-color-adjust:exact}}
</style></head><body><main class="page"><header class="hero"><div class="hero-inner"><div class="topline"><span class="badge">Knowledge OS Export</span><span class="email">${OWNER_EMAIL}</span></div><h1>${escapedTitle}</h1><div class="subtitle">Professional revision note generated from Knowledge OS</div><div class="meta"><span class="pill">Created: ${note.created || "-"}</span><span class="pill">Updated: ${note.updated || "-"}</span><span class="pill">${wc} words</span><span class="pill">${readMin} min read</span></div></div></header><section class="body-wrap">${pathCrumb}<article class="doc-card"><div class="doc-head"><span>Revision Document</span><div class="tags">${tagHtml}</div></div><div class="doc-body"><div class="body">${bodyHtml}</div></div></article></section><footer class="footer"><div><strong>Knowledge OS</strong><br/>Exported ${exportedOn}</div><div>Owner<br/><span class="mail">${OWNER_EMAIL}</span></div></footer></main></body></html>`;
    const a = document.createElement("a");
    a.href = "data:text/html;charset=utf-8," + encodeURIComponent(html);
    a.download = (title || "note").replace(/\s+/g, "-").toLowerCase() + ".html";
    a.click();
    onToast("Exported as professional HTML", ic.download);
  };
  const nodePath = (() => {
    const all = flattenTree(tree);
    const n = all.find(x => x.id === noteId);
    return n ? n.path : [];
  })();

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", overflow: "hidden" }}>
      {tableEdit && (
        <TableEditorModal
          data={tableEdit.data}
          onSave={saveTableEdit}
          onCancel={() => setTableEdit(null)}
        />
      )}
      <div className="toolbar">
        <button className="tbtn mobile-focus-btn" onClick={onToggleMobileFocus}>
          <Icon d={mobileFocus ? ic.minimize : ic.maximize} size={13} /> {mobileFocus ? "Minimize" : "Full screen"}
        </button>
        <div className="tsep mobile-focus-sep" />

        {/* Undo / Redo */}
        <button className="tbtn" onClick={undo} disabled={!canUndo}
          title="Undo (Ctrl+Z)"
          style={{ opacity: canUndo ? 1 : 0.35, cursor: canUndo ? "pointer" : "not-allowed" }}>
          <Icon d={ic.undo} size={14} /> Undo
        </button>
        <button className="tbtn" onClick={redo} disabled={!canRedo}
          title="Redo (Ctrl+Y)"
          style={{ opacity: canRedo ? 1 : 0.35, cursor: canRedo ? "pointer" : "not-allowed" }}>
          <Icon d={ic.redo} size={14} /> Redo
        </button>
        <div className="tsep" />

        <div className="color-row">
          {COLORS.map(c => (
            <div key={c} className={`cp${color === c ? " sel" : ""}`}
              style={{ background: c || "var(--bg4)", border: color === c ? "2px solid rgba(255,255,255,0.7)" : undefined }}
              onClick={() => { setColor(c); sched(title, content, tags, pinned, archived, c); }} title={c || "No color"} />
          ))}
        </div>
        <div className="tsep" />
        <button className={`tbtn${pinned ? " on" : ""}`} onClick={() => { const p = !pinned; setPinned(p); save(title, content, tags, p, archived, color); onToast(p ? "Pinned" : "Unpinned", ic.pin); }}>
          <Icon d={ic.pin} size={13} fill={pinned ? "var(--rose)" : "none"} stroke={pinned ? "var(--rose)" : "currentColor"} /> {pinned ? "Pinned" : "Pin"}
        </button>
        <button className={`tbtn${archived ? " on" : ""}`} onClick={() => { const a = !archived; setArchived(a); save(title, content, tags, pinned, a, color); onToast(a ? "Archived" : "Unarchived", ic.archive); }}>
          <Icon d={ic.archive} size={13} /> {archived ? "Archived" : "Archive"}
        </button>
        <div className="tsep" />
        <button className={`tbtn${!preview ? " on" : ""}`} onClick={() => { setPreview(p => !p); setAdvancedEdit(false); }}>
          <Icon d={ic.edit} size={13} /> {preview ? "Edit" : "Editing…"}
        </button>
        {/* Advanced Edit — only in preview mode */}
        {preview && contentType !== "html-doc" && (
          <>
            <div className="tsep" />
            {advancedEdit ? (
              <>
                <button className="tbtn on" style={{ color:"var(--emerald)" }} onClick={saveAdvancedEdit}>
                  <Icon d={ic.check} size={13} /> Save Changes
                </button>
                <button className="tbtn danger" onClick={() => setAdvancedEdit(false)}>
                  <Icon d={ic.close} size={13} /> Cancel
                </button>
              </>
            ) : (
              <button className="tbtn" style={{ background:"rgba(124,106,247,0.1)", color:"var(--accent2)", border:"1px solid rgba(124,106,247,0.3)", borderRadius:6 }}
                onClick={() => setAdvancedEdit(true)} title="Edit content directly in preview — tables, text, everything">
                <Icon d={ic.sparkle} size={13} /> Advanced Edit
              </button>
            )}
          </>
        )}
        {/* Content type badge */}
        <span style={{ fontSize: 10, padding: "2px 7px", borderRadius: 99, background: contentType === "html-doc" ? "rgba(251,191,36,0.15)" : contentType === "html-snippet" ? "rgba(34,211,238,0.12)" : "rgba(124,106,247,0.12)", color: contentType === "html-doc" ? "var(--amber)" : contentType === "html-snippet" ? "var(--teal)" : "var(--accent2)", fontWeight: 600, whiteSpace: "nowrap" }}>
          {contentType === "html-doc" ? "HTML DOC" : contentType === "html-snippet" ? "HTML" : "MARKDOWN"}
        </span>
        <div className="tspace" />
        {(note.kosKey || noteId) && (
          <div style={{ display:"flex", alignItems:"center", gap:6, padding:"4px 10px", borderRadius:6,
            background:"rgba(124,106,247,0.15)", border:"1px solid rgba(124,106,247,0.4)", flexShrink:0 }}>
            <span style={{ fontSize:13 }}>🔑</span>
            <input
              readOnly
              value={note.kosKey || noteId.replace("note_","#NOTE-")}
              title="Click to select, then Ctrl+C to copy — tell Claude this key to update the note"
              onFocus={e => e.target.select()}
              onClick={e => e.target.select()}
              style={{ fontSize:12, fontFamily:"var(--mono)", color:"var(--accent2)",
                background:"transparent", border:"none", outline:"none",
                cursor:"text", userSelect:"all", width: Math.max(80, ((note.kosKey||noteId).length * 8)) + "px" }}
            />
          </div>
        )}
        <button className="tbtn" onClick={copyContent}><Icon d={ic.copy} size={13} /> Copy</button>
        <button className="tbtn" onClick={exportHTML}><Icon d={ic.export} size={13} /> Export HTML</button>
        <NoteAttachments
          noteId={noteId}
          attachments={note?.attachments || []}
          onUpdate={atts => onUpdate(noteId, { attachments: atts })} />
        <button className="tbtn danger" onClick={() => onDelete(noteId)}>
          <Icon d={ic.trash} size={13} /> Delete
        </button>
        <button className={`tbtn${saved ? " success" : ""}`}>
          <Icon d={saved ? ic.check : ic.refresh} size={13} /> {saved ? "Saved" : "Saving…"}
        </button>
      </div>

      <div style={{ flex: 1, overflowY: "auto", background: color || "transparent",
        ...(color ? {
          '--t0': '#111827', '--t1': '#374151', '--t2': '#6b7280',
          '--border': 'rgba(0,0,0,0.12)', '--border-hi': 'rgba(0,0,0,0.22)',
          '--bg3': 'rgba(0,0,0,0.07)', '--bg4': 'rgba(0,0,0,0.12)',
          '--glass-hi': 'rgba(0,0,0,0.07)', '--accent': '#5b4cf0', '--accent2': '#7c3aed',
          color: '#111827'
        } : {}) }}>
        <div className="content">
          {nodePath.length > 0 && (
            <div className="breadcrumb">
              {nodePath.map((p, i) => <span key={i}>{i > 0 && <span className="sep"> › </span>}{p}</span>)}
              <span className="sep"> › </span>
              <span style={{ color: "var(--t1)" }}>{title || "Untitled"}</span>
            </div>
          )}
          <input className="note-h1" value={title} placeholder="Note title…"
            onChange={e => { setTitle(e.target.value); sched(e.target.value, content, tags, pinned, archived, color); }} />
          <div className="note-meta">
            <div className="meta-chip"><Icon d={ic.clock} size={12} />{note.created || "—"}</div>
            <div className="meta-chip"><Icon d={ic.edit} size={12} />Updated {note.updated || "—"}</div>
            <div className="meta-chip"><Icon d={ic.eye} size={12} />{Math.max(1, Math.ceil(words / 200))} min read</div>
            {tags.map(t => <span key={t} className="tag" onClick={() => removeTag(t)} title="Click to remove">{t} ×</span>)}
            {tagInput ? (
              <input autoFocus value={tagVal} onChange={e => setTagVal(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") submitTag(); if (e.key === "Escape") { setTagInput(false); setTagVal(""); } }}
                onBlur={submitTag}
                placeholder="tag name…"
                style={{ fontSize: 11, padding: "2px 8px", borderRadius: 99, border: "1px solid var(--accent)", background: "var(--bg3)", color: "var(--t0)", outline: "none", width: 90, fontFamily: "var(--font)" }} />
            ) : (
              <span className="tag add" onClick={addTag}>+ tag</span>
            )}
            {pinned && <span className="badge badge-purple">Pinned</span>}
            {archived && <span className="badge badge-amber">Archived</span>}
          </div>
          {/* ── Formatting toolbar — shown in Edit mode AND Advanced Edit mode ── */}
          {(!preview || advancedEdit) && (() => {
            // Helper: in advanced edit, use execCommand (keeps focus on contenteditable)
            const adv = advancedEdit;
            const cmd = (e, command, val) => { e.preventDefault(); document.execCommand(command, false, val || null); };
            const ins = (e, html) => { e.preventDefault(); document.execCommand('insertHTML', false, html); };
            const getSel = () => { const s = window.getSelection(); return s && s.toString() ? s.toString() : null; };

            const doColor = (e, hex) => {
              if (adv) { e.preventDefault(); document.execCommand('foreColor', false, hex); setFmtColorOpen(false); }
              else insertColor(hex);
            };
            const doTable = (e, w, cols, rows) => {
              if (adv) {
                const th = `padding:8px 12px;background:#252840;color:#f0f2ff;border:1px solid #3d4060;text-align:left`;
                const td = `padding:8px 12px;border:1px solid #3d4060`;
                const wStyle = w === "auto" ? "" : `width:${w};`;
                const ths = Array.from({length:cols},(_,i)=>`<th style="${th}">Header ${i+1}</th>`).join("");
                const tds = Array.from({length:cols},(_,i)=>`<td style="${td}">Cell ${i+1}</td>`).join("");
                const trs = Array.from({length:rows},()=>`<tr>${tds}</tr>`).join("");
                ins(e, `<table style="${wStyle}border-collapse:collapse"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`);
                setFmtTableOpen(false);
              } else { insertHtmlTable(w, cols, rows); }
            };

            return (
              <div className="fmt-bar">
                {/* Bold / Italic / Strike */}
                <button className="fmt-btn" title="Bold"
                  onMouseDown={adv ? e => cmd(e,'bold') : undefined}
                  onClick={!adv ? () => insertFormat("**","**","bold text") : undefined}><b>B</b></button>
                <button className="fmt-btn" title="Italic"
                  onMouseDown={adv ? e => cmd(e,'italic') : undefined}
                  onClick={!adv ? () => insertFormat("*","*","italic text") : undefined}><i>I</i></button>
                <button className="fmt-btn" title="Strikethrough" style={{textDecoration:"line-through"}}
                  onMouseDown={adv ? e => cmd(e,'strikeThrough') : undefined}
                  onClick={!adv ? () => insertFormat("~~","~~","strikethrough") : undefined}>S</button>

                {/* Font Color */}
                <div className="fmt-popup-wrap">
                  <button className="fmt-btn" title="Font color"
                    onMouseDown={adv ? e => e.preventDefault() : undefined}
                    onClick={() => { setFmtColorOpen(o=>!o); setFmtTableOpen(false); }}>
                    <span style={{display:"inline-block",width:12,height:12,borderRadius:"50%",background:"linear-gradient(135deg,#ef4444,#3b82f6,#22c55e)",border:"1.5px solid rgba(255,255,255,0.3)"}}/>A▾
                  </button>
                  {fmtColorOpen && (
                    <div className="fmt-popup" style={{minWidth:220}}>
                      <div className="fmt-popup-title">Font Color</div>
                      <div className="fmt-color-grid">
                        {FONT_COLORS.map(({c,n}) => (
                          <div key={c} className="fmt-color-swatch" style={{background:c}} title={n}
                            onMouseDown={adv ? e => doColor(e,c) : undefined}
                            onClick={!adv ? () => insertColor(c) : undefined} />
                        ))}
                      </div>
                      <div style={{marginTop:10,display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:11,color:"var(--t2)"}}>Custom:</span>
                        <input type="color" defaultValue="#ffffff"
                          style={{width:28,height:22,border:"none",background:"none",cursor:"pointer",padding:0}}
                          onChange={e => adv ? document.execCommand('foreColor',false,e.target.value) : insertColor(e.target.value)} />
                      </div>
                    </div>
                  )}
                </div>

                <div className="fmt-sep"/>
                {/* Headings */}
                {[["H1","h1","# ",13],["H2","h2","## ",12],["H3","h3","### ",11]].map(([lbl,tag,pfx,fs]) => (
                  <button key={lbl} className="fmt-btn" title={lbl} style={{fontSize:fs}}
                    onMouseDown={adv ? e => cmd(e,'formatBlock',tag) : undefined}
                    onClick={!adv ? () => insertLine(pfx) : undefined}>{lbl}</button>
                ))}

                <div className="fmt-sep"/>
                {/* Lists & Quote */}
                <button className="fmt-btn" title="Bullet list"
                  onMouseDown={adv ? e => cmd(e,'insertUnorderedList') : undefined}
                  onClick={!adv ? () => insertLine("- ") : undefined}>• List</button>
                <button className="fmt-btn" title="Numbered list"
                  onMouseDown={adv ? e => cmd(e,'insertOrderedList') : undefined}
                  onClick={!adv ? () => insertLine("1. ") : undefined}>1. List</button>
                <button className="fmt-btn" title="Checklist"
                  onMouseDown={adv ? e => ins(e, `<ul><li class="task"><span class="task-check"></span><span class="task-txt">${getSel()||'To-do item'}</span></li></ul>`) : undefined}
                  onClick={!adv ? insertChecklist : undefined}>☑ Checklist</button>
                <button className="fmt-btn" title="Blockquote"
                  onMouseDown={adv ? e => cmd(e,'formatBlock','blockquote') : undefined}
                  onClick={!adv ? () => insertLine("> ") : undefined}>❝ Quote</button>

                <div className="fmt-sep"/>
                {/* Code */}
                <button className="fmt-btn" title="Inline code" style={{fontFamily:"var(--mono)"}}
                  onMouseDown={adv ? e => ins(e,`<code style="font-family:monospace;background:#1d2030;color:#22d3ee;padding:2px 6px;border-radius:4px">${getSel()||'code'}</code>`) : undefined}
                  onClick={!adv ? () => insertFormat("`","`","code") : undefined}>{"<>"} Code</button>
                <button className="fmt-btn" title="Code block" style={{fontFamily:"var(--mono)"}}
                  onMouseDown={adv ? e => ins(e,`<pre style="background:#1d2030;border-radius:8px;padding:14px;overflow:auto"><code style="color:#34d399;font-family:monospace">${getSel()||'code block'}</code></pre>`) : undefined}
                  onClick={!adv ? () => insertFormat("```\n","\n```","code block") : undefined}>{"```"} Block</button>

                <div className="fmt-sep"/>
                {/* Table */}
                <div className="fmt-popup-wrap">
                  <button className="fmt-btn" title="Insert table"
                    onMouseDown={adv ? e => e.preventDefault() : undefined}
                    onClick={() => { setFmtTableOpen(o=>!o); setFmtColorOpen(false); }}>⊞ Table ▾</button>
                  {fmtTableOpen && (
                    <div className="fmt-popup" style={{minWidth:230}}>
                      <div className="fmt-popup-title">Table Width</div>
                      <div className="fmt-table-opts">
                        {[{label:"25%",w:"25%",bar:25},{label:"50%",w:"50%",bar:50},{label:"75%",w:"75%",bar:75},{label:"100%",w:"100%",bar:100},{label:"Auto",w:"auto",bar:40}].map(({label,w,bar}) => (
                          <div key={w} className="fmt-table-opt"
                            onMouseDown={adv ? e => doTable(e,w,3,2) : undefined}
                            onClick={!adv ? () => insertHtmlTable(w,3,2) : undefined}>
                            <span>{label}</span><div className="fmt-table-bar" style={{width:bar*0.6}}/>
                          </div>
                        ))}
                      </div>
                      <div style={{marginTop:8,borderTop:"1px solid var(--border)",paddingTop:8}}>
                        <div className="fmt-popup-title">Columns × Rows</div>
                        <div style={{display:"flex",gap:6}}>
                          {[[2,2],[3,2],[4,3],[5,3]].map(([c,r]) => (
                            <button key={`${c}x${r}`} className="fmt-btn" style={{fontSize:11,padding:"3px 7px",border:"1px solid var(--border)"}}
                              onMouseDown={adv ? e => doTable(e,"100%",c,r) : undefined}
                              onClick={!adv ? () => insertHtmlTable("100%",c,r) : undefined}>{c}×{r}</button>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>

                {/* Line */}
                <button className="fmt-btn" title="Horizontal line"
                  onMouseDown={adv ? e => ins(e,'<hr style="border:none;border-top:1px solid #3d4060;margin:14px 0">') : undefined}
                  onClick={!adv ? () => insertLine("---") : undefined}>― Line</button>
              </div>
            );
          })()}

          {/* Content area */}
          {preview ? (
            advancedEdit ? (
              <div style={{ position: "relative" }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10, padding:"7px 12px", background:"rgba(124,106,247,0.1)", border:"1px solid rgba(124,106,247,0.3)", borderRadius:8 }}>
                  <Icon d={ic.sparkle} size={13} stroke="var(--accent2)" />
                  <span style={{ fontSize:12, color:"var(--accent2)", fontWeight:600 }}>Advanced Edit — use the toolbar above or click anywhere to type</span>
                  <span style={{ fontSize:11, color:"var(--t2)", marginLeft:"auto" }}>Save Changes in toolbar when done</span>
                </div>
                <div ref={advEditRef} contentEditable suppressContentEditableWarning
                  className="md-view"
                  style={{ outline:"2px solid var(--accent)", outlineOffset:3, borderRadius:8, minHeight:300 }} />
              </div>
            ) : renderPreview()
          ) : (
            <div style={{ position: "relative" }}>
              {slashMenu && slashFiltered.length > 0 && (
                <div ref={slashRef} className="slash-menu">
                  <div className="slash-menu-title">Commands</div>
                  {slashFiltered.map((cmd, i) => (
                    <div key={cmd.label}
                      className={`slash-item${i === slashIdx ? " sel" : ""}`}
                      onMouseDown={e => { e.preventDefault(); runSlashCommand(cmd); }}>
                      <span className="slash-icon">{cmd.icon}</span>
                      <span className="slash-label">{cmd.label}</span>
                      <span className="slash-desc">{cmd.desc}</span>
                    </div>
                  ))}
                </div>
              )}
              <textarea ref={textareaRef} className="note-textarea" value={content}
                placeholder={"Start writing…\n\nType / for commands, or use the toolbar above:\n# Heading  **bold**  `code`\n- Bullet  ☑ Checklist  > Quote"}
                onChange={handleTextareaChange}
                onKeyDown={handleTextareaKeyDown} />
            </div>
          )}
        </div>
      </div>
      {(() => {
        const taskMatches = [...content.matchAll(/^- \[([ xX])\] /gm)];
        const totalTasks = taskMatches.length;
        const doneTasks = taskMatches.filter(m => m[1].toLowerCase() === "x").length;
        return (
          <div className="word-count-bar">
            <span>{words} words</span>
            <span>·</span>
            <span>{content.length} chars</span>
            <span>·</span>
            <span>{Math.max(1, Math.ceil(words / 200))} min read</span>
            {totalTasks > 0 && (
              <>
                <span>·</span>
                <span style={{ color: doneTasks === totalTasks ? "var(--emerald)" : "var(--t2)" }}>
                  {doneTasks}/{totalTasks} tasks
                </span>
                <div style={{ flex: 1, maxWidth: 80, height: 4, background: "var(--bg4)", borderRadius: 99, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${(doneTasks / totalTasks) * 100}%`, background: doneTasks === totalTasks ? "var(--emerald)" : "var(--accent)", borderRadius: 99, transition: "width 0.4s ease" }} />
                </div>
              </>
            )}
            {!saved && <span style={{ marginLeft: "auto", color: "var(--amber)" }}>● Unsaved</span>}
          </div>
        );
      })()}

    </div>
  );
}

// ── NoteAttachments — compact popover version ─────────────────────────────────
function NoteAttachments({ noteId, attachments, onUpdate }) {
  const [open, setOpen] = useState(false);
  const [progress, setProgress] = useState({});
  const [error, setError] = useState(null);
  const fileInputRef = useRef(null);
  const popoverRef = useRef(null);
  const MAX_FILE_MB = 50;
  const list = attachments || [];

  // Close popover on outside click
  useEffect(() => {
    if (!open) return;
    const h = (e) => { if (!popoverRef.current?.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h);
    return () => document.removeEventListener("mousedown", h);
  }, [open]);

  const fileColor = (type, name) => {
    const ext = (name || "").split(".").pop().toLowerCase();
    if (type && type.startsWith("image/")) return "var(--emerald)";
    if (ext === "pdf") return "var(--rose)";
    if (["docx","doc","odt"].includes(ext)) return "var(--accent)";
    if (["xlsx","xls","csv"].includes(ext)) return "var(--emerald)";
    if (["pptx","ppt"].includes(ext)) return "var(--orange)";
    return "var(--teal)";
  };

  const formatSize = (bytes) => {
    if (!bytes) return "";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  };

  const uploadFiles = async (files) => {
    if (!files || files.length === 0) return;
    setError(null);
    const oversized = [...files].find(f => f.size > MAX_FILE_MB * 1024 * 1024);
    if (oversized) { setError(`"${oversized.name}" exceeds ${MAX_FILE_MB} MB`); return; }

    const newList = [...list];
    for (const file of [...files]) {
      setProgress(p => ({ ...p, [file.name]: 10 }));
      // Animate progress while the actual upload runs
      let fakePct = 10;
      const ticker = setInterval(() => {
        fakePct = Math.min(fakePct + Math.random() * 8, 90);
        setProgress(p => ({ ...p, [file.name]: Math.round(fakePct) }));
      }, 300);
      try {
        console.log("[v0] starting upload for", file.name, "to note", noteId);
        const result = await firebaseFileStore.upload(noteId, file);
        console.log("[v0] upload done:", result.url);
        clearInterval(ticker);
        setProgress(p => ({ ...p, [file.name]: 100 }));
        newList.push(result);
      } catch (err) {
        clearInterval(ticker);
        console.error("[v0] upload error:", err.code, err.message);
        setError(`Upload failed: ${err.message}`);
        setProgress(p => { const n = { ...p }; delete n[file.name]; return n; });
      }
    }
    onUpdate(newList);
    setTimeout(() => setProgress({}), 1000);
  };

  const handleRemove = async (att) => {
    try { await firebaseFileStore.remove(att.path); } catch {}
    onUpdate(list.filter(a => a.id !== att.id));
  };

  return (
    <div style={{ position: "relative", display: "inline-flex" }} ref={popoverRef}>
      {/* Compact trigger button */}
      <button
        className={`tbtn${list.length > 0 ? " on" : ""}`}
        title="Reference documents"
        onClick={() => { setOpen(o => !o); setError(null); }}>
        <Icon d={ic.paperclip} size={13} />
        {list.length > 0 && <span style={{ marginLeft: 4 }}>{list.length}</span>}
      </button>
      <input ref={fileInputRef} type="file" multiple style={{ display: "none" }}
        accept=".pdf,.doc,.docx,.xls,.xlsx,.csv,.ppt,.pptx,.txt,.md,.png,.jpg,.jpeg,.gif,.webp,.zip,.json"
        onChange={e => { uploadFiles(e.target.files); e.target.value = ""; }} />

      {/* Popover */}
      {open && (
        <div className="att-popover">
          <div className="att-pop-head">
            <span className="att-pop-title">
              <Icon d={ic.paperclip} size={13} stroke="var(--t2)" /> Reference Documents
            </span>
            <button className="ibtn" title="Attach file" onClick={() => fileInputRef.current?.click()}>
              <Icon d={ic.plus} size={14} />
            </button>
          </div>

          {/* Upload progress items */}
          {Object.entries(progress).map(([name, pct]) => (
            <div key={name} className="att-row">
              <div className="att-file-icon" style={{ color: "var(--accent)" }}>
                <Icon d={ic.upload} size={13} />
              </div>
              <div className="att-row-main">
                <div className="att-row-name">{name}</div>
                <div className="att-progress-wrap"><div className="att-progress-bar" style={{ width: `${pct}%` }} /></div>
              </div>
              <span style={{ fontSize: 10, color: "var(--t2)" }}>{pct < 100 ? `${pct}%` : "Done"}</span>
            </div>
          ))}

          {/* File list */}
          {list.length === 0 && Object.keys(progress).length === 0 && (
            <div className="att-empty"
              onClick={() => fileInputRef.current?.click()}
              onDragOver={e => e.preventDefault()}
              onDrop={e => { e.preventDefault(); uploadFiles(e.dataTransfer.files); }}>
              <Icon d={ic.upload} size={18} stroke="var(--t2)" />
              <span>Click or drop files to attach</span>
            </div>
          )}

          {list.map(att => (
            <div key={att.id} className="att-row">
              <div className="att-file-icon" style={{ color: fileColor(att.type, att.name) }}>
                <Icon d={ic.file} size={13} />
              </div>
              <div className="att-row-main">
                <div className="att-row-name" title={att.name}>{att.name}</div>
                <div className="att-row-meta">{formatSize(att.size)}{att.type ? ` · ${(att.type.split("/")[1] || att.type).toUpperCase()}` : ""}</div>
              </div>
              <a href={att.url} target="_blank" rel="noopener noreferrer" className="ibtn" title="Open">
                <Icon d={ic.externalLink} size={12} />
              </a>
              <button className="ibtn" title="Remove" style={{ color: "var(--rose)" }} onClick={() => handleRemove(att)}>
                <Icon d={ic.trash} size={12} />
              </button>
            </div>
          ))}

          {error && (
            <div style={{ display: "flex", gap: 6, alignItems: "center", padding: "6px 10px", fontSize: 11, color: "var(--rose)", borderTop: "1px solid var(--border)" }}>
              <Icon d={ic.close} size={11} stroke="var(--rose)" />
              {error}
              <button onClick={() => setError(null)} style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", fontSize: 11, color: "var(--t2)", padding: 0 }}>×</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}
